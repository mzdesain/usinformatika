<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Sekolah Informatika - SMAS Tahfidz Al-Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .animate-save { animation: blink 1s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app">
        <!-- Loader Area -->
        <div id="loader" class="flex items-center justify-center min-h-screen text-center flex-col p-6">
            <div id="spinner" class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loader-text" class="text-slate-500 font-medium">Menghubungkan ke Server...</p>
            
            <div id="setup-guide" class="hidden mt-6 p-6 bg-white rounded-2xl shadow-xl max-w-lg border border-orange-200">
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">Konfigurasi Belum Siap</h3>
                <p class="text-sm text-slate-600 mb-4 text-left">Agar fitur simpan otomatis dan panel admin berfungsi di GitHub, Anda perlu memasukkan <b>Firebase Config</b> milik Anda ke dalam file HTML ini.</p>
                <div class="bg-slate-900 text-slate-300 p-3 rounded-lg text-xs font-mono text-left mb-4 overflow-x-auto">
                    firebaseConfig = {<br>
                    &nbsp;&nbsp;apiKey: "ISI_DISINI",<br>
                    &nbsp;&nbsp;...<br>
                    };
                </div>
                <p class="text-xs text-slate-400 italic text-left">Dapatkan di: console.firebase.google.com</p>
            </div>
        </div>
    </div>

    <!-- Modal Warning (Pop-up Peringatan Bagus) -->
    <div id="modal-warning" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl text-center transform transition-all">
            <div id="warning-icon-container" class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 id="warning-title" class="text-xl font-bold text-slate-800 mb-3">Peringatan!</h3>
            <p id="warning-message" class="text-slate-600 mb-8 leading-relaxed"></p>
            <button onclick="window.closeWarning()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">OK, Mengerti</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI DATABASE ---
        let firebaseConfig = {
            apiKey: "AIzaSyCdZliEF6yVmdQRNHhSRa4Z9YR1fn-CCYQ",
            authDomain: "chatting-22bb9.firebaseapp.com",
            projectId: "chatting-22bb9",
            storageBucket: "chatting-22bb9.firebasestorage.app",
            messagingSenderId: "540910795541",
            appId: "1:540910795541:web:785aff5846eab68636c71c"
        };
        let appId = 'ujian-informatika-001';

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'ujian-informatika-001';
            }
        } catch (e) {
            console.warn("Config loading error");
        }

        const app = firebaseConfig.apiKey ? initializeApp(firebaseConfig) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;

        // --- DATA SOAL (40 PG) ---
        const questionsA = [
            { q: "AI atau Kecerdasan Buatan adalah teknologi yang membuat komputer atau mesin bisa berpikir dan belajar seperti manusia.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Articial Intelligents adalah kepanjangan dari AI.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Salah" },
            { q: "TIK fokus pada pengembangan teknologi, sedangkan Informatika fokus pada penggunaan teknologi.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Information and Communication Tekhnology adalah kepanjangan dari TIK dalam bahasa inggris.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Hardware adalah semua komponen fisik komputer yang dapat dilihat dan disentuh. Hardware berfungsi sebagai alat input, output, pemroses, dan penyimpan data.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Perangkat keras jaringan yang berfungsi untuk menghubungkan beberapa komputer pada jaringan lokal (LAN) adalah...", opts: ["Router", "Switch/Hub", "Modem", "Repeater"], key: "Switch/Hub" },
            { q: "Topologi jaringan yang menggunakan satu kabel pusat sebagai media transmisi data adalah...", opts: ["Topologi Star", "Topologi Mesh", "Topologi Bus", "Topologi Ring"], key: "Topologi Bus" },
            { q: "Jenis kabel jaringan yang menggunakan cahaya untuk mengirimkan data dan memiliki kecepatan paling tinggi adalah...", opts: ["UTP", "Coaxial", "Fiber Optic", "STP"], key: "Fiber Optic" },
            { q: "Alamat unik yang dimiliki oleh setiap perangkat keras agar dapat teridentifikasi dalam jaringan disebut...", opts: ["IP Address", "MAC Address", "URL", "Gateway"], key: "MAC Address" },
            { q: "Jaringan komputer yang mencakup area satu kota atau wilayah tertentu disebut dengan...", opts: ["PAN", "LAN", "MAN", "WAN"], key: "MAN" },
            { q: "WWW merupakan singkatan dari istilah teknologi internet yaitu...", opts: ["World Wide Web", "World Web Wide", "Web World Wide", "Wide World Web"], key: "World Wide Web" },
            { q: "Protokol standar yang digunakan untuk mengirim pesan elektronik (email) melalui internet adalah...", opts: ["HTTP", "FTP", "SMTP", "TCP/IP"], key: "SMTP" },
            { q: "Manakah di bawah ini yang merupakan contoh dari mesin pencari (Search Engine)?", opts: ["Google & Bing", "Chrome & Firefox", "WhatsApp & Telegram", "Facebook & Instagram"], key: "Google & Bing" },
            { q: "Perangkat yang berfungsi untuk merubah sinyal analog menjadi digital dan sebaliknya agar komputer bisa terhubung ke internet adalah...", opts: ["Hub", "Modem", "Switch", "Router"], key: "Modem" },
            { q: "Sistem yang dirancang untuk mencegah akses yang tidak sah atau mencurigakan masuk ke dalam jaringan pribadi disebut...", opts: ["Firewall", "Antivirus", "Spyware", "Adware"], key: "Firewall" },
            { q: "Domain yang biasanya digunakan khusus untuk institusi pendidikan tinggi (Universitas) di Indonesia adalah...", opts: [".com", ".id", ".ac.id", ".go.id"], key: ".ac.id" },
            { q: "Browser web populer yang dikembangkan dan dimiliki oleh perusahaan Google adalah...", opts: ["Safari", "Opera", "Microsoft Edge", "Google Chrome"], key: "Google Chrome" },
            { q: "Satuan untuk mengukur kecepatan transfer data dalam sebuah jaringan internet adalah...", opts: ["Hertz (Hz)", "Byte (B)", "Bits per second (bps)", "Watt (W)"], key: "Bits per second (bps)" },
            { q: "Upaya penipuan untuk mendapatkan informasi data pribadi seperti password dan kartu kredit dengan menyamar sebagai institusi resmi melalui email/link palsu disebut...", opts: ["Hacking", "Phishing", "Spamming", "Cracking"], key: "Phishing" },
            { q: "Perangkat lunak berbahaya yang dirancang untuk merusak, mengganggu, atau mencuri data dari sistem komputer disebut...", opts: ["Software", "Firmware", "Malware", "Hardware"], key: "Malware" },
            { q: "Manakah di bawah ini yang merupakan perangkat keras keluaran (Output Device)?", opts: ["Scanner", "Monitor", "Keyboard", "Mouse"], key: "Monitor" },
            { q: "Unit pada komputer yang sering disebut sebagai 'Otak Komputer' karena fungsinya sebagai pusat pemrosesan adalah...", opts: ["Hardisk", "RAM", "CPU", "Power Supply"], key: "CPU" },
            { q: "Apa fungsi utama dari Sistem Operasi (Operating System) pada komputer?", opts: ["Mengelola hardware & software", "Membuat desain grafis", "Menyusun tabel data", "Mengedit video"], key: "Mengelola hardware & software" },
            { q: "File dengan ekstensi '.docx' merupakan format dokumen yang biasanya dibuat menggunakan aplikasi...", opts: ["Ms. Excel", "Ms. PowerPoint", "Ms. Word", "Ms. Access"], key: "Ms. Word" },
            { q: "Teknologi nirkabel jarak pendek yang umum digunakan untuk mentransfer file antar perangkat seluler adalah...", opts: ["Infrared", "Bluetooth", "Fiber Optic", "Broadband"], key: "Bluetooth" },
            { q: "Materi dasar yang pertama kali dipelajari mengenai teknologi informasi adalah...", opts: ["Pengenalan Informatika", "Sistem Database", "Kriptografi", "Robotika"], key: "Pengenalan Informatika" },
            { q: "Mengapa kita perlu belajar Informatika di sekolah?", opts: ["Agar bisa main game saja", "Mempersiapkan skill digital masa depan", "Hanya untuk syarat kelulusan", "Agar bisa merakit PC sendiri"], key: "Mempersiapkan skill digital masa depan" },
            { q: "Tiga komponen utama dalam Teknologi Informasi dan Komunikasi (TIK) adalah...", opts: ["Hardware, Software, Brainware", "Monitor, Mouse, Keyboard", "Google, Yahoo, Bing", "Excel, Word, PowerPoint"], key: "Hardware, Software, Brainware" },
            { q: "Internet sebagai jaringan global yang kita kenal sekarang, awal cikal bakalnya ditemukan pada tahun...", opts: ["1945", "1969 (ARPANET)", "1998", "2010"], key: "1969 (ARPANET)" },
            { q: "Apa perbedaan utama antara jaringan lokal (LAN) dengan internet?", opts: ["LAN menggunakan kabel, internet tidak", "Internet cakupannya global, LAN terbatas area kecil", "LAN lebih lambat dari internet", "Internet hanya untuk media sosial"], key: "Internet cakupannya global, LAN terbatas area kecil" },
            { q: "Apakah kepanjangan dari istilah jaringan LAN?", opts: ["Local Area Network", "Link Area Node", "Light Access Net", "Large Area Network"], key: "Local Area Network" },
            { q: "Manakah yang merupakan kumpulan topologi jaringan komputer?", opts: ["Bus, Star, Ring, Mesh", "Keyboard, Mouse, Monitor", "Windows, Linux, Android", "Word, Excel, Access"], key: "Bus, Star, Ring, Mesh" },
            { q: "Di bawah ini yang merupakan jenis platform media sosial populer adalah...", opts: ["WhatsApp, Facebook, Instagram", "Chrome, Firefox, Safari", "Windows, MacOS, Linux", "Photoshop, Corel, Canva"], key: "WhatsApp, Facebook, Instagram" },
            { q: "Apa salah satu manfaat positif dari penggunaan media sosial?", opts: ["Mempercepat komunikasi dan berbagi informasi", "Menghabiskan waktu luang", "Memperbanyak kuota internet", "Melihat foto orang lain saja"], key: "Mempercepat komunikasi dan berbagi informasi" },
            { q: "Salah satu dampak negatif dari media sosial jika tidak digunakan dengan bijak adalah...", opts: ["Penyebaran berita bohong (Hoax)", "Memudahkan mencari materi belajar", "Mendapatkan banyak teman", "Media promosi gratis"], key: "Penyebaran berita bohong (Hoax)" },
            { q: "Proses mengubah data menjadi kode rahasia agar tidak mudah dibaca oleh pihak yang tidak berwenang disebut...", opts: ["Enkripsi", "Deskripsi", "Kompresi", "Instalasi"], key: "Enkripsi" },
            { q: "Manakah yang merupakan media penyimpanan data permanen dengan kecepatan akses paling cepat saat ini?", opts: ["Hardisk Drive (HDD)", "Solid State Drive (SSD)", "Flashdisk", "Floppy Disk"], key: "Solid State Drive (SSD)" },
            { q: "Dalam pemrograman, tempat untuk menyimpan nilai data yang dapat berubah-ubah selama program dijalankan disebut...", opts: ["Konstanta", "Variabel", "Looping", "Function"], key: "Variabel" },
            { q: "Etika dan tanggung jawab dalam menggunakan teknologi informasi secara bijak dikenal dengan istilah...", opts: ["Digital Citizenship", "Cyber Crime", "Social Media Admin", "IT Support"], key: "Digital Citizenship" },
            { q: "Teknologi yang memungkinkan pengolahan data dalam skala yang sangat besar dan kompleks disebut...", opts: ["Small Data", "Big Data", "Manual Data", "Paper Data"], key: "Big Data" }
        ];

        const questionsB = [
            "Jelaskan secara singkat apa yang dimaksud dengan Cloud Computing!",
            "Sebutkan 2 contoh perangkat input (masukan) pada komputer!",
            "Apa yang dimaksud dengan algoritma dalam konteks pemrograman?",
            "Mengapa kita perlu menggunakan kata sandi (password) yang kuat untuk akun media sosial?",
            "Tuliskan langkah-langkah sederhana mengirim file menggunakan layanan Google Drive!"
        ];

        // --- APP STATE ---
        let currentView = 'exam';
        let currentUser = null;
        let tabSwitchCount = 0;
        let studentName = "";
        let studentClass = "XII A";
        let submissions = [];
        let selectedSubmission = null;
        let isAuthReady = false;
        let lastSavedData = null;
        let autoSaveTimer = null;

        // --- AUTH INIT ---
        const initAuth = async () => {
            if (!auth) {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('loader-text').classList.add('hidden');
                document.getElementById('setup-guide').classList.remove('hidden');
                return;
            }
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    isAuthReady = true;
                    if (user) await loadExistingDraft();
                    render();
                });
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };
        initAuth();

        // --- POP-UP LOGIC ---
        window.showWarning = (msg, title = "Peringatan!") => {
            document.getElementById('warning-title').textContent = title;
            document.getElementById('warning-message').textContent = msg;
            document.getElementById('modal-warning').classList.remove('hidden');
        };

        window.closeWarning = () => {
            document.getElementById('modal-warning').classList.add('hidden');
        };

        // --- AUTO-SAVE LOGIC ---
        const loadExistingDraft = async () => {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (!data.finalSubmitted) {
                        studentName = data.name || "";
                        studentClass = data.class || "XII A";
                        tabSwitchCount = data.tabSwitches || 0;
                        lastSavedData = data;
                    } else {
                        currentView = 'finished';
                        studentName = data.name;
                        tabSwitchCount = data.tabSwitches;
                    }
                }
            } catch (e) {
                console.error("Draft Load Error:", e);
            }
        };

        window.triggerAutoSave = () => {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                await saveDraft();
            }, 1000);
        };

        const saveDraft = async (isFinal = false) => {
            if (!currentUser || !db || currentView !== 'exam') return;
            
            const nameField = document.getElementById('input-name');
            const classField = document.getElementById('input-class');
            
            const currentName = nameField ? nameField.value.trim() : studentName;
            const currentClass = classField ? classField.value : studentClass;

            const answersA = [];
            questionsA.forEach((_, i) => {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                answersA.push(sel ? sel.value : "");
            });

            const answersB = [];
            questionsB.forEach((_, i) => {
                const val = document.getElementById(`qb_${i}`);
                answersB.push(val ? val.value.trim() : "");
            });

            const data = {
                name: currentName,
                class: currentClass,
                tabSwitches: tabSwitchCount,
                answersA,
                answersB,
                uid: currentUser.uid,
                timestamp: new Date().toISOString(),
                finalSubmitted: isFinal,
                graded: isFinal ? false : (lastSavedData?.graded || false),
                essayScore: lastSavedData?.essayScore || 0
            };

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                await setDoc(docRef, data);
                lastSavedData = data;
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.classList.remove('hidden');
                    indicator.classList.add('flex', 'animate-save');
                    setTimeout(() => indicator.classList.remove('animate-save'), 1000);
                }
            } catch (e) {
                console.error("Save Draft Error:", e);
            }
        };

        // --- LOGIC FUNCTIONS ---
        window.onblur = () => {
            if (currentView === 'exam' && isAuthReady) {
                tabSwitchCount++;
                saveDraft();
                window.showWarning(`Anda terdeteksi meninggalkan halaman ujian! Jangan membuka tab atau aplikasi lain. (Pelanggaran: ${tabSwitchCount} kali)`, "Kecurangan Terdeteksi!");
            }
        };

        const calculateScore = (answersA, essayScore = 0) => {
            let correctCount = 0;
            answersA.forEach((ans, i) => {
                if (ans === questionsA[i].key) correctCount++;
            });
            const pgScore = correctCount * 2;
            const rawScore = pgScore + parseFloat(essayScore); 
            const finalScore = Math.round((rawScore / 100) * 88 + 10);
            let grade = 'D';
            if (finalScore >= 90) grade = 'A';
            else if (finalScore >= 80) grade = 'B';
            else if (finalScore >= 70) grade = 'C';
            return { score: finalScore, grade, correct: correctCount, raw: rawScore };
        };

        const fetchSubmissions = async () => {
            if (!db || !currentUser) return;
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
                submissions = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        };

        const updateEssayScore = async (id, newEssayScore) => {
            if (!db || !currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', id);
            await updateDoc(docRef, {
                essayScore: parseFloat(newEssayScore),
                graded: true
            });
            fetchSubmissions();
            selectedSubmission = null;
        };

        // --- RENDERER ---
        const render = () => {
            const root = document.getElementById('app');
            if (!isAuthReady) return;

            if (currentView === 'exam') {
                root.innerHTML = renderExam();
                if (lastSavedData) {
                    document.getElementById('input-name').value = lastSavedData.name || "";
                    document.getElementById('input-class').value = lastSavedData.class || "XII A";
                    lastSavedData.answersA.forEach((ans, i) => {
                        if (ans) {
                            const radio = document.querySelector(`input[name="qa_${i}"][value="${ans}"]`);
                            if (radio) radio.checked = true;
                        }
                    });
                    lastSavedData.answersB.forEach((ans, i) => {
                        if (ans) document.getElementById(`qb_${i}`).value = ans;
                    });
                }
            } else if (currentView === 'finished') {
                root.innerHTML = renderFinished();
            } else if (currentView === 'admin_login') {
                root.innerHTML = renderAdminLogin();
            } else if (currentView === 'admin_dashboard') {
                root.innerHTML = renderAdminDashboard();
            }
        };

        const renderExam = () => `
            <header class="bg-blue-900 text-white py-8 px-4 shadow-lg mb-8 relative">
                <button onclick="window.setView('admin_login')" class="absolute top-2 right-2 text-[8px] opacity-20 hover:opacity-100 p-2">ADMIN</button>
                <div class="max-w-4xl mx-auto text-center">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaC7zNuBILaC544879xnoWvGCnxA9Fc83PCg&s" class="h-20 mx-auto mb-4 rounded-lg shadow-lg">
                    <h2 class="text-xs font-semibold uppercase opacity-70 tracking-widest">Pemerintah Provinsi Sulawesi Selatan</h2>
                    <h1 class="text-xl md:text-2xl font-bold mt-1 leading-tight">SMAS TAHFIDZ AL-QURAN WAHDAH ISLAMIYAH ANABANUA</h1>
                    <p class="text-sm mt-2 opacity-80 italic">Ujian Sekolah Mata Pelajaran: Informatika</p>
                </div>
            </header>

            <main class="max-w-4xl mx-auto px-4 pb-32">
                <section class="glass-card p-6 rounded-2xl mb-6 border-l-4 border-blue-500">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-3 text-sm font-bold">01</span>
                        Identitas Peserta
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="input-name" oninput="window.triggerAutoSave()" placeholder="Nama Lengkap *" class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <select id="input-class" onchange="window.triggerAutoSave()" class="p-3 border rounded-lg outline-none bg-white">
                            <option>XII A</option>
                            <option>XII B</option>
                        </select>
                    </div>
                </section>

                <section class="glass-card p-6 rounded-2xl mb-6 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-3 text-sm font-bold">A</span>
                        Pilihan Ganda & Ceklis (80 Poin)
                    </h3>
                    <div class="space-y-6">
                        ${questionsA.map((q, i) => `
                            <div class="p-4 border-b border-slate-100 last:border-0 hover:bg-slate-50/50 rounded-xl transition-all">
                                <p class="font-semibold text-slate-700 mb-4 leading-relaxed">${i+1}. ${q.q}</p>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    ${q.opts.map(opt => `
                                        <label class="flex items-center p-3 border rounded-xl hover:bg-blue-50 cursor-pointer transition-all border-slate-200 bg-white shadow-sm hover:border-blue-300 group">
                                            <input type="radio" name="qa_${i}" value="${opt}" onchange="window.triggerAutoSave()" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                                            <span class="ml-3 text-sm font-medium text-slate-600 group-hover:text-blue-700">${opt}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="glass-card p-6 rounded-2xl mb-10 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-3 text-sm font-bold">B</span>
                        Essay (20 Poin)
                    </h3>
                    <div class="space-y-6">
                        ${questionsB.map((q, i) => `
                            <div class="hover:bg-slate-50/50 p-2 rounded-xl transition-all">
                                <p class="font-semibold text-slate-700 mb-3">${i+1}. ${q}</p>
                                <textarea id="qb_${i}" oninput="window.triggerAutoSave()" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" rows="3" placeholder="Tulis jawaban Anda dengan lengkap..."></textarea>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <button onclick="window.handleFinish()" class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-green-700 transition-all transform active:scale-95 text-lg">
                    KONFIRMASI & KIRIM JAWABAN
                </button>
            </main>

            <div id="save-indicator" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md px-6 py-3 rounded-full shadow-2xl border border-blue-100 hidden items-center space-x-3 z-50">
                <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Progress Tersimpan</span>
            </div>
        `;

        const renderFinished = () => `
            <div class="min-h-screen flex items-center justify-center p-4 text-center bg-slate-50">
                <div class="glass-card p-12 rounded-[2.5rem] max-w-md w-full shadow-2xl border-2 border-white">
                    <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-4">Ujian Selesai!</h2>
                    <p class="text-slate-600 mb-8 leading-relaxed">Alhamdulillah, <b>${studentName}</b>. Jawaban Anda telah terkirim dan tersimpan aman di database sekolah.</p>
                    <div class="p-5 bg-orange-50 rounded-2xl text-left border border-orange-100 mb-8">
                        <p class="text-sm font-semibold text-orange-800">Catatan Kejujuran:</p>
                        <p class="text-xs text-orange-700 mt-1">Anda keluar dari halaman sebanyak <b>${tabSwitchCount} kali</b> selama ujian.</p>
                    </div>
                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">Selesai</button>
                </div>
            </div>
        `;

        const renderAdminLogin = () => `
            <div class="min-h-screen flex items-center justify-center p-4 bg-slate-100 font-sans">
                <div class="glass-card p-10 rounded-[2rem] w-full max-w-sm text-center shadow-2xl border border-white">
                    <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 rotate-3 shadow-lg">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Akses Guru</h2>
                    <p class="text-xs text-slate-400 mb-8">Masukkan kata sandi administrator</p>
                    <input type="password" id="admin-pass" class="w-full p-4 border border-slate-200 rounded-2xl mb-6 text-center text-lg focus:ring-4 focus:ring-blue-100 outline-none transition-all" placeholder="Password Admin">
                    <button onclick="window.doAdminLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">Masuk Sekarang</button>
                    <button onclick="window.setView('exam')" class="mt-6 text-xs text-slate-400 hover:text-slate-600 font-medium transition-colors">← Kembali ke Halaman Ujian</button>
                </div>
            </div>
        `;

        const renderAdminDashboard = () => `
            <div class="p-6 md:p-10 max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                    <div>
                        <div class="flex items-center space-x-3 mb-2">
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold tracking-widest uppercase">Panel Administrator</span>
                        </div>
                        <h1 class="text-3xl font-bold text-slate-800">Dashboard Monitoring Siswa</h1>
                        <p class="text-slate-500 text-sm mt-1 italic">Hasil Ujian Sekolah XII Informatika</p>
                    </div>
                    <button onclick="window.setView('exam')" class="bg-white border-2 border-slate-100 px-6 py-3 rounded-2xl text-sm font-bold shadow-sm hover:bg-slate-50 transition-all active:scale-95">Keluar Panel</button>
                </div>

                <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-[0.15em]">
                                <tr>
                                    <th class="px-8 py-6">Informasi Siswa</th>
                                    <th class="px-8 py-6">Kondisi Ujian</th>
                                    <th class="px-8 py-6">Keamanan</th>
                                    <th class="px-8 py-6 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm">
                                ${submissions.length === 0 ? '<tr><td colspan="4" class="px-8 py-16 text-center text-slate-300 italic text-lg font-medium">Belum ada siswa yang melakukan login atau mengerjakan.</td></tr>' : ''}
                                ${submissions.map(s => {
                                    const result = calculateScore(s.answersA, s.essayScore || 0);
                                    return `
                                    <tr class="hover:bg-blue-50/20 transition-colors">
                                        <td class="px-8 py-6">
                                            <p class="font-bold text-slate-800 text-base">${s.name || '<span class="text-slate-300 italic">Anonim</span>'}</p>
                                            <p class="text-[10px] text-slate-400 font-semibold tracking-wider mt-0.5">${s.class}</p>
                                        </td>
                                        <td class="px-8 py-6">
                                            <span class="px-4 py-1.5 rounded-full text-[9px] font-extrabold shadow-sm ${s.finalSubmitted ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-blue-100 text-blue-700 border border-blue-200'} uppercase tracking-widest">
                                                ${s.finalSubmitted ? 'Selesai' : 'Mengerjakan'}
                                            </span>
                                            <p class="text-[9px] text-slate-400 mt-2 font-medium">Nilai: <span class="text-slate-700 font-bold">${result.score}</span></p>
                                        </td>
                                        <td class="px-8 py-6">
                                            <div class="flex items-center space-x-2">
                                                <div class="w-2 h-2 rounded-full ${s.tabSwitches > 0 ? 'bg-red-500 shadow-[0_0_6px_#ef4444]' : 'bg-green-500 shadow-[0_0_6px_#22c55e]'}"></div>
                                                <span class="font-bold text-xs ${s.tabSwitches > 0 ? 'text-red-500' : 'text-slate-700'}">${s.tabSwitches}x Pindah Tab</span>
                                            </div>
                                        </td>
                                        <td class="px-8 py-6 text-center">
                                            <button onclick="window.inspectSubmission('${s.id}')" class="bg-slate-900 text-white hover:bg-blue-600 px-6 py-2.5 rounded-xl text-xs font-bold transition-all shadow-md active:scale-95">Lihat Hasil</button>
                                        </td>
                                    </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                ${selectedSubmission ? renderInspector() : ''}
            </div>
        `;

        const renderInspector = () => {
            const result = calculateScore(selectedSubmission.answersA, selectedSubmission.essayScore || 0);
            return `
            <div class="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
                <div class="bg-white rounded-[2.5rem] max-w-6xl w-full max-h-[92vh] overflow-hidden flex flex-col shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] border border-white">
                    <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">${selectedSubmission.name}</h2>
                            <div class="flex items-center space-x-3 mt-2">
                                <span class="text-xs bg-white border px-3 py-1 rounded-full font-bold text-slate-500 shadow-sm">${selectedSubmission.class}</span>
                                <span class="text-xs bg-blue-600 px-3 py-1 rounded-full font-bold text-white shadow-md">Skor Akhir: ${result.score} (${result.grade})</span>
                            </div>
                        </div>
                        <button onclick="window.closeInspector()" class="p-3 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-2xl transition-all active:scale-90">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-10 grid grid-cols-1 lg:grid-cols-2 gap-10 bg-slate-50/30">
                        <div>
                            <h3 class="font-bold text-slate-800 mb-6 flex items-center text-sm uppercase tracking-widest">
                                <span class="w-6 h-6 bg-slate-800 text-white rounded-md flex items-center justify-center mr-3 text-[10px]">A</span>
                                Lembar Pilihan Ganda
                            </h3>
                            <div class="space-y-3 h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                                ${selectedSubmission.answersA.map((ans, i) => {
                                    const isCorrect = ans === questionsA[i].key;
                                    return `
                                        <div class="p-4 border rounded-2xl ${isCorrect ? 'bg-white border-green-200' : ans ? 'bg-white border-red-200' : 'bg-slate-100 border-slate-200'} shadow-sm transition-all hover:shadow-md">
                                            <p class="text-xs font-bold text-slate-700 leading-relaxed">${i+1}. ${questionsA[i].q}</p>
                                            <div class="mt-3 flex items-center justify-between">
                                                <p class="text-[10px] uppercase tracking-wider">Jawaban: <span class="font-extrabold ${isCorrect ? 'text-green-600' : 'text-red-500'}">${ans || 'TIDAK DIISI'}</span></p>
                                                ${ans && !isCorrect ? `<p class="text-[9px] text-slate-400 font-medium italic">Kunci: ${questionsA[i].key}</p>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl flex flex-col h-full">
                            <h3 class="font-bold text-slate-800 mb-6 flex items-center text-sm uppercase tracking-widest">
                                <span class="w-6 h-6 bg-slate-800 text-white rounded-md flex items-center justify-center mr-3 text-[10px]">B</span>
                                Lembar Jawaban Essay
                            </h3>
                            <div class="space-y-6 flex-1 overflow-y-auto pr-2 mb-8">
                                ${questionsB.map((q, i) => `
                                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 transition-all hover:bg-slate-100/50">
                                        <p class="text-xs font-bold text-slate-500 mb-2 tracking-wide uppercase">${i+1}. Pertanyaan</p>
                                        <p class="text-[11px] font-semibold text-slate-700 mb-4">${q}</p>
                                        <p class="text-xs leading-relaxed text-slate-800 font-medium bg-white p-4 rounded-xl border border-slate-200 shadow-inner">${selectedSubmission.answersB[i] || '<span class="text-slate-300 italic">Siswa tidak mengisi jawaban.</span>'}</p>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="pt-8 border-t-2 border-dashed border-slate-100 mt-auto">
                                <div class="flex items-center justify-between mb-4">
                                    <label class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-blue-600">Skor Essay Manual (0-20)</label>
                                    <span class="text-[10px] text-slate-300 italic font-medium">* Beri minimal 1 poin/soal</span>
                                </div>
                                <input type="number" id="essay-score-input" value="${selectedSubmission.essayScore || 0}" min="0" max="20" class="w-full p-5 border-2 border-blue-50 rounded-2xl mb-6 text-center text-4xl font-black text-blue-700 shadow-inner focus:ring-4 focus:ring-blue-50 focus:border-blue-200 outline-none transition-all">
                                <button onclick="window.saveGrading('${selectedSubmission.id}')" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all active:scale-95 text-sm uppercase tracking-widest">Update Nilai Akhir</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        };

        // --- GLOBAL ACTIONS ---
        window.setView = (view) => {
            if (!isAuthReady) return;
            currentView = view;
            if (view === 'admin_dashboard') fetchSubmissions();
            else render();
        };

        window.doAdminLogin = () => {
            const pass = document.getElementById('admin-pass').value;
            // Memastikan password admin dicek dengan benar
            if (pass === 'admin123') { 
                window.setView('admin_dashboard');
            } else {
                window.showWarning("Kata sandi yang Anda masukkan salah. Silakan coba lagi.", "Akses Ditolak");
            }
        };

        window.handleFinish = async () => {
            if (!isAuthReady) return;
            studentName = document.getElementById('input-name').value.trim();
            studentClass = document.getElementById('input-class').value;

            if (!studentName) return window.showWarning("Mohon lengkapi Nama Anda sebelum mengirim jawaban.", "Identitas Kosong");

            const answersA = [];
            for (let i = 0; i < questionsA.length; i++) {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                if (!sel) return window.showWarning(`Soal Pilihan Ganda nomor ${i+1} belum dijawab!`, "Belum Lengkap");
                answersA.push(sel.value);
            }

            const answersB = [];
            for (let i = 0; i < questionsB.length; i++) {
                const val = document.getElementById(`qb_${i}`).value.trim();
                if (!val) return window.showWarning(`Soal Essay nomor ${i+1} belum dijawab!`, "Belum Lengkap");
                answersB.push(val);
            }

            try {
                await saveDraft(true);
                currentView = 'finished';
                render();
            } catch (err) {
                window.showWarning("Gagal mengirim jawaban. Periksa koneksi internet Anda.", "Koneksi Bermasalah");
            }
        };

        window.inspectSubmission = (id) => {
            selectedSubmission = submissions.find(s => s.id === id);
            render();
        };

        window.closeInspector = () => {
            selectedSubmission = null;
            render();
        };

        window.saveGrading = async (id) => {
            const score = document.getElementById('essay-score-input').value;
            if (score < 0 || score > 20) return window.showWarning("Skor essay maksimal adalah 20.", "Input Tidak Valid");
            await updateEssayScore(id, score);
        };

        render();
    </script>
</body>
</html>
