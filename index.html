<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Sekolah Informatika - SMAS Tahfidz Al-Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .animate-save { animation: blink 1s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 leading-relaxed">

    <div id="app">
        <!-- Loader Area -->
        <div id="loader" class="flex items-center justify-center min-h-screen text-center flex-col p-6">
            <div id="spinner" class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loader-text" class="text-slate-500 font-medium text-sm">Menghubungkan ke Server...</p>
            
            <div id="setup-guide" class="hidden mt-6 p-6 bg-white rounded-2xl shadow-sm border border-slate-200 max-w-lg">
                <h3 class="text-lg font-bold text-slate-800 mb-2">Konfigurasi Dibutuhkan</h3>
                <p class="text-sm text-slate-600 mb-4">Pastikan Firebase Config telah dimasukkan ke dalam kode agar sistem dapat berjalan.</p>
            </div>
        </div>
    </div>

    <!-- Modal Warning Minimalis -->
    <div id="modal-warning" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-sm border border-slate-200 text-center transform transition-all">
            <h3 id="warning-title" class="text-base font-bold text-slate-800 mb-2">Pemberitahuan</h3>
            <p id="warning-message" class="text-slate-500 mb-6 text-sm"></p>
            <button onclick="window.closeWarning()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-black transition-all active:scale-95 text-xs">TUTUP</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI DATABASE ---
        let firebaseConfig = {
            apiKey: "AIzaSyCdZliEF6yVmdQRNHhSRa4Z9YR1fn-CCYQ",
            authDomain: "chatting-22bb9.firebaseapp.com",
            projectId: "chatting-22bb9",
            storageBucket: "chatting-22bb9.firebasestorage.app",
            messagingSenderId: "540910795541",
            appId: "1:540910795541:web:785aff5846eab68636c71c"
        };
        let appId = 'ujian-informatika-001';

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'ujian-informatika-001';
            }
        } catch (e) { console.warn("Using internal config"); }

        const app = firebaseConfig.apiKey ? initializeApp(firebaseConfig) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;

        // --- DATA SOAL ---
        const questionsA = [
            { q: "AI atau Kecerdasan Buatan adalah teknologi yang membuat komputer atau mesin bisa berpikir dan belajar seperti manusia.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Articial Intelligents adalah kepanjangan dari AI.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Salah" },
            { q: "TIK fokus pada pengembangan teknologi, sedangkan Informatika fokus pada penggunaan teknologi.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Information and Communication Tekhnology adalah kepanjangan dari TIK dalam bahasa inggris.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Hardware adalah semua komponen fisik komputer yang dapat dilihat dan disentuh. Hardware berfungsi sebagai alat input, output, pemroses, dan penyimpan data.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Perangkat keras jaringan yang berfungsi untuk menghubungkan beberapa komputer pada jaringan lokal (LAN) adalah...", opts: ["Router", "Switch/Hub", "Modem", "Repeater"], key: "Switch/Hub" },
            { q: "Topologi jaringan yang menggunakan satu kabel pusat sebagai media transmisi data adalah...", opts: ["Topologi Star", "Topologi Mesh", "Topologi Bus", "Topologi Ring"], key: "Topologi Bus" },
            { q: "Jenis kabel jaringan yang menggunakan cahaya untuk mengirimkan data dan memiliki kecepatan paling tinggi adalah...", opts: ["UTP", "Coaxial", "Fiber Optic", "STP"], key: "Fiber Optic" },
            { q: "Alamat unik yang dimiliki oleh setiap perangkat keras agar dapat teridentifikasi dalam jaringan disebut...", opts: ["IP Address", "MAC Address", "URL", "Gateway"], key: "MAC Address" },
            { q: "Jaringan komputer yang mencakup area satu kota atau wilayah tertentu disebut dengan...", opts: ["PAN", "LAN", "MAN", "WAN"], key: "MAN" },
            { q: "WWW merupakan singkatan dari istilah teknologi internet yaitu...", opts: ["World Wide Web", "World Web Wide", "Web World Wide", "Wide World Web"], key: "World Wide Web" },
            { q: "Protokol standar yang digunakan untuk mengirim pesan elektronik (email) melalui internet adalah...", opts: ["HTTP", "FTP", "SMTP", "TCP/IP"], key: "SMTP" },
            { q: "Manakah di bawah ini yang merupakan contoh dari mesin pencari (Search Engine)?", opts: ["Google & Bing", "Chrome & Firefox", "WhatsApp & Telegram", "Facebook & Instagram"], key: "Google & Bing" },
            { q: "Perangkat yang berfungsi untuk merubah sinyal analog menjadi digital dan sebaliknya agar komputer bisa terhubung ke internet adalah...", opts: ["Hub", "Modem", "Switch", "Router"], key: "Modem" },
            { q: "Sistem yang dirancang untuk mencegah akses yang tidak sah atau mencurigakan masuk ke dalam jaringan pribadi disebut...", opts: ["Firewall", "Antivirus", "Spyware", "Adware"], key: "Firewall" },
            { q: "Domain yang biasanya digunakan khusus untuk institusi pendidikan tinggi (Universitas) di Indonesia adalah...", opts: [".com", ".id", ".ac.id", ".go.id"], key: ".ac.id" },
            { q: "Browser web populer yang dikembangkan dan dimiliki oleh perusahaan Google adalah...", opts: ["Safari", "Opera", "Microsoft Edge", "Google Chrome"], key: "Google Chrome" },
            { q: "Satuan untuk mengukur kecepatan transfer data dalam sebuah jaringan internet adalah...", opts: ["Hertz (Hz)", "Byte (B)", "Bits per second (bps)", "Watt (W)"], key: "Bits per second (bps)" },
            { q: "Upaya penipuan untuk mendapatkan informasi data pribadi seperti password dan kartu kredit dengan menyamar sebagai institusi resmi melalui email/link palsu disebut...", opts: ["Hacking", "Phishing", "Spamming", "Cracking"], key: "Phishing" },
            { q: "Perangkat lunak berbahaya yang dirancang untuk merusak, mengganggu, atau mencuri data dari sistem komputer disebut...", opts: ["Software", "Firmware", "Malware", "Hardware"], key: "Malware" },
            { q: "Manakah di bawah ini yang merupakan perangkat keras keluaran (Output Device)?", opts: ["Scanner", "Monitor", "Keyboard", "Mouse"], key: "Monitor" },
            { q: "Unit pada komputer yang sering disebut sebagai 'Otak Komputer' karena fungsinya sebagai pusat pemrosesan adalah...", opts: ["Hardisk", "RAM", "CPU", "Power Supply"], key: "CPU" },
            { q: "Apa fungsi utama dari Sistem Operasi (Operating System) pada komputer?", opts: ["Mengelola hardware & software", "Membuat desain grafis", "Menyusun tabel data", "Mengedit video"], key: "Mengelola hardware & software" },
            { q: "File dengan ekstensi '.docx' merupakan format dokumen yang biasanya dibuat menggunakan aplikasi...", opts: ["Ms. Excel", "Ms. PowerPoint", "Ms. Word", "Ms. Access"], key: "Ms. Word" },
            { q: "Teknologi nirkabel jarak pendek yang umum digunakan untuk mentransfer file antar perangkat seluler adalah...", opts: ["Infrared", "Bluetooth", "Fiber Optic", "Broadband"], key: "Bluetooth" },
            { q: "Materi dasar yang pertama kali dipelajari mengenai teknologi informasi adalah...", opts: ["Pengenalan Informatika", "Sistem Database", "Kriptografi", "Robotika"], key: "Pengenalan Informatika" },
            { q: "Mengapa kita perlu belajar Informatika di sekolah?", opts: ["Agar bisa main game saja", "Mempersiapkan skill digital masa depan", "Hanya untuk syarat kelulusan", "Agar bisa merakit PC sendiri"], key: "Mempersiapkan skill digital masa depan" },
            { q: "Tiga komponen utama dalam Teknologi Informasi dan Komunikasi (TIK) adalah...", opts: ["Hardware, Software, Brainware", "Monitor, Mouse, Keyboard", "Google, Yahoo, Bing", "Excel, Word, PowerPoint"], key: "Hardware, Software, Brainware" },
            { q: "Internet sebagai jaringan global yang kita kenal sekarang, awal cikal bakalnya ditemukan pada tahun...", opts: ["1945", "1969 (ARPANET)", "1998", "2010"], key: "1969 (ARPANET)" },
            { q: "Apa perbedaan utama antara jaringan lokal (LAN) dengan internet?", opts: ["LAN menggunakan kabel, internet tidak", "Internet cakupannya global, LAN terbatas area kecil", "LAN lebih lambat dari internet", "Internet hanya untuk media sosial"], key: "Internet cakupannya global, LAN terbatas area kecil" },
            { q: "Apakah kepanjangan dari istilah jaringan LAN?", opts: ["Local Area Network", "Link Area Node", "Light Access Net", "Large Area Network"], key: "Local Area Network" },
            { q: "Manakah yang merupakan kumpulan topologi jaringan komputer?", opts: ["Bus, Star, Ring, Mesh", "Keyboard, Mouse, Monitor", "Windows, Linux, Android", "Word, Excel, Access"], key: "Bus, Star, Ring, Mesh" },
            { q: "Di bawah ini yang merupakan jenis platform media sosial populer adalah...", opts: ["WhatsApp, Facebook, Instagram", "Chrome, Firefox, Safari", "Windows, MacOS, Linux", "Photoshop, Corel, Canva"], key: "WhatsApp, Facebook, Instagram" },
            { q: "Apa salah satu manfaat positif dari penggunaan media sosial?", opts: ["Mempercepat komunikasi dan berbagi informasi", "Menghabiskan waktu luang", "Memperbanyak kuota internet", "Melihat foto orang lain saja"], key: "Mempercepat komunikasi dan berbagi informasi" },
            { q: "Salah satu dampak negatif dari media sosial jika tidak digunakan dengan bijak adalah...", opts: ["Penyebaran berita bohong (Hoax)", "Memudahkan mencari materi belajar", "Mendapatkan banyak teman", "Media promosi gratis"], key: "Penyebaran berita bohong (Hoax)" },
            { q: "Proses mengubah data menjadi kode rahasia agar tidak mudah dibaca oleh pihak yang tidak berwenang disebut...", opts: ["Enkripsi", "Deskripsi", "Kompresi", "Instalasi"], key: "Enkripsi" },
            { q: "Manakah yang merupakan media penyimpanan data permanen dengan kecepatan akses paling cepat saat ini?", opts: ["Hardisk Drive (HDD)", "Solid State Drive (SSD)", "Flashdisk", "Floppy Disk"], key: "Solid State Drive (SSD)" },
            { q: "Dalam pemrograman, tempat untuk menyimpan nilai data yang dapat berubah-ubah selama program dijalankan disebut...", opts: ["Konstanta", "Variabel", "Looping", "Function"], key: "Variabel" },
            { q: "Etika dan tanggung jawab dalam menggunakan teknologi informasi secara bijak dikenal dengan istilah...", opts: ["Digital Citizenship", "Cyber Crime", "Social Media Admin", "IT Support"], key: "Digital Citizenship" },
            { q: "Teknologi yang memungkinkan pengolahan data dalam skala yang sangat besar dan kompleks disebut...", opts: ["Small Data", "Big Data", "Manual Data", "Paper Data"], key: "Big Data" }
        ];

        const questionsB = [
            "Jelaskan secara singkat apa yang dimaksud dengan Cloud Computing!",
            "Sebutkan 2 contoh perangkat input (masukan) pada komputer!",
            "Apa yang dimaksud dengan algoritma dalam konteks pemrograman?",
            "Mengapa kita perlu menggunakan kata sandi (password) yang kuat untuk akun media sosial?",
            "Tuliskan langkah-langkah sederhana mengirim file menggunakan layanan Google Drive!"
        ];

        // --- APP STATE ---
        let currentView = 'exam';
        let currentUser = null;
        let tabSwitchCount = 0;
        let studentName = "";
        let studentClass = "XII A";
        let submissions = [];
        let selectedSubmission = null;
        let isAuthReady = false;
        let lastSavedData = null;
        let autoSaveTimer = null;

        // --- AUTH INIT ---
        const initAuth = async () => {
            if (!auth) {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('loader-text').classList.add('hidden');
                document.getElementById('setup-guide').classList.remove('hidden');
                return;
            }
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    isAuthReady = true;
                    if (user) await loadExistingDraft();
                    render();
                });
            } catch (error) { console.error(error); }
        };
        initAuth();

        // --- POP-UP LOGIC ---
        window.showWarning = (msg, title = "Informasi") => {
            document.getElementById('warning-title').textContent = title;
            document.getElementById('warning-message').textContent = msg;
            document.getElementById('modal-warning').classList.remove('hidden');
        };

        window.closeWarning = () => {
            document.getElementById('modal-warning').classList.add('hidden');
        };

        // --- AUTO-SAVE LOGIC ---
        const loadExistingDraft = async () => {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (!data.finalSubmitted) {
                        studentName = data.name || "";
                        studentClass = data.class || "XII A";
                        tabSwitchCount = data.tabSwitches || 0;
                        lastSavedData = data;
                    } else {
                        currentView = 'finished';
                        studentName = data.name;
                    }
                }
            } catch (e) { console.error(e); }
        };

        window.triggerAutoSave = () => {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                await saveDraft();
            }, 1000);
        };

        const saveDraft = async (isFinal = false) => {
            if (!currentUser || !db || currentView !== 'exam') return;
            const answersA = [];
            questionsA.forEach((_, i) => {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                answersA.push(sel ? sel.value : "");
            });
            const answersB = [];
            questionsB.forEach((_, i) => {
                const val = document.getElementById(`qb_${i}`);
                answersB.push(val ? val.value.trim() : "");
            });
            const data = {
                name: document.getElementById('input-name')?.value.trim() || studentName,
                class: document.getElementById('input-class')?.value || studentClass,
                tabSwitches: tabSwitchCount,
                answersA,
                answersB,
                uid: currentUser.uid,
                timestamp: new Date().toISOString(),
                finalSubmitted: isFinal,
                graded: isFinal ? false : (lastSavedData?.graded || false),
                essayScore: lastSavedData?.essayScore || 0
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid), data);
                lastSavedData = data;
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.classList.remove('hidden');
                    indicator.classList.add('flex', 'animate-save');
                    setTimeout(() => indicator.classList.remove('animate-save'), 1000);
                }
            } catch (e) { console.error(e); }
        };

        // --- LOGIC FUNCTIONS ---
        window.onblur = () => {
            if (currentView === 'exam' && isAuthReady) {
                tabSwitchCount++;
                saveDraft();
                window.showWarning(`Terdeteksi meninggalkan halaman! Pelanggaran: ${tabSwitchCount} kali.`, "Sistem Keamanan");
            }
        };

        const calculateScore = (answersA, essayScore = 0) => {
            let correctCount = 0;
            answersA.forEach((ans, i) => { if (ans === questionsA[i].key) correctCount++; });
            const rawScore = (correctCount * 2) + parseFloat(essayScore); 
            const finalScore = Math.round((rawScore / 100) * 88 + 10);
            let grade = finalScore >= 90 ? 'A' : finalScore >= 80 ? 'B' : finalScore >= 70 ? 'C' : 'D';
            return { score: finalScore, grade, correct: correctCount };
        };

        const fetchSubmissions = async () => {
            if (!db || !currentUser) return;
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
                submissions = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (err) { 
                console.error(err); 
                window.showWarning("Gagal memuat data dari server. Periksa koneksi internet atau Rules Firebase Anda.");
            }
            render(); // Selalu render setelah mencoba mengambil data agar view berubah
        };

        const updateEssayScore = async (id, newEssayScore) => {
            if (!db || !currentUser) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', id), {
                essayScore: parseFloat(newEssayScore),
                graded: true
            });
            fetchSubmissions();
            selectedSubmission = null;
        };

        // --- RENDERER ---
        const render = () => {
            const root = document.getElementById('app');
            if (!isAuthReady) return;
            if (currentView === 'exam') {
                root.innerHTML = renderExam();
                if (lastSavedData) {
                    document.getElementById('input-name').value = lastSavedData.name || "";
                    document.getElementById('input-class').value = lastSavedData.class || "XII A";
                    lastSavedData.answersA.forEach((ans, i) => {
                        if (ans) {
                            const radio = document.querySelector(`input[name="qa_${i}"][value="${ans}"]`);
                            if (radio) radio.checked = true;
                        }
                    });
                    lastSavedData.answersB.forEach((ans, i) => {
                        if (ans) document.getElementById(`qb_${i}`).value = ans;
                    });
                }
            } else if (currentView === 'finished') { root.innerHTML = renderFinished(); }
            else if (currentView === 'admin_login') { root.innerHTML = renderAdminLogin(); }
            else if (currentView === 'admin_dashboard') { root.innerHTML = renderAdminDashboard(); }
        };

        const renderExam = () => `
            <header class="bg-white border-b border-slate-200 py-6 px-4 mb-8 relative">
                <button onclick="window.setView('admin_login')" class="absolute top-4 right-4 text-[10px] font-bold text-slate-300 hover:text-slate-600 transition-colors uppercase tracking-widest">Akses Guru</button>
                <div class="max-w-3xl mx-auto text-center">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaC7zNuBILaC544879xnoWvGCnxA9Fc83PCg&s" class="h-14 mx-auto mb-3 grayscale opacity-70">
                    <h1 class="text-base font-bold tracking-tight text-slate-800 uppercase leading-snug">SMAS TAHFIDZ AL-QURAN WAHDAH ISLAMIYAH ANABANUA</h1>
                    <p class="text-[10px] mt-1 text-slate-400 font-bold uppercase tracking-[0.2em]">Ujian Sekolah Informatika (XII)</p>
                </div>
            </header>

            <main class="max-w-3xl mx-auto px-4 pb-32">
                <div class="bg-white border border-slate-200 rounded-xl p-6 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="input-name" oninput="window.triggerAutoSave()" placeholder="Nama Lengkap *" class="p-3 border border-slate-200 rounded-lg outline-none focus:border-blue-500 text-sm font-medium transition-all">
                        <select id="input-class" onchange="window.triggerAutoSave()" class="p-3 border border-slate-200 rounded-lg outline-none bg-white text-sm font-medium transition-all">
                            <option>XII A</option>
                            <option>XII B</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4 mb-10">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1">Bagian I: Pilihan Ganda</h3>
                    ${questionsA.map((q, i) => `
                        <div class="bg-white border border-slate-200 rounded-xl p-6 transition-all">
                            <p class="text-sm font-semibold text-slate-700 mb-5 leading-relaxed">${i+1}. ${q.q}</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                                ${q.opts.map(opt => `
                                    <label class="flex items-center p-3 border border-slate-100 rounded-lg cursor-pointer transition-all hover:bg-slate-50 border-slate-200 shadow-sm">
                                        <input type="radio" name="qa_${i}" value="${opt}" onchange="window.triggerAutoSave()" class="w-4 h-4 text-blue-600">
                                        <span class="ml-3 text-[11px] font-medium text-slate-500">${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="space-y-4 mb-14">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1">Bagian II: Essay</h3>
                    ${questionsB.map((q, i) => `
                        <div class="bg-white border border-slate-200 rounded-xl p-6">
                            <p class="text-sm font-semibold text-slate-700 mb-4">${i+1}. ${q}</p>
                            <textarea id="qb_${i}" oninput="window.triggerAutoSave()" class="w-full p-4 border border-slate-200 rounded-lg outline-none focus:border-blue-500 text-sm transition-all" rows="3" placeholder="Ketik jawaban Anda..."></textarea>
                        </div>
                    `).join('')}
                </div>

                <button onclick="window.handleFinish()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all active:scale-[0.98] text-xs uppercase tracking-[0.2em] shadow-sm">
                    Kirim Jawaban Final
                </button>
            </main>

            <div id="save-indicator" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white px-5 py-2.5 rounded-full shadow-sm border border-slate-200 hidden items-center space-x-2 z-50">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Sinkronisasi Server</span>
            </div>
        `;

        const renderFinished = () => `
            <div class="min-h-screen flex items-center justify-center p-6 text-center">
                <div class="max-w-sm w-full">
                    <div class="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 mb-2 uppercase tracking-tight">Ujian Selesai</h2>
                    <p class="text-sm text-slate-400 mb-8 font-medium">Terima kasih, <b>${studentName}</b>. Jawaban Anda sudah terenkripsi dan aman.</p>
                    <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all">Selesai</button>
                </div>
            </div>
        `;

        const renderAdminLogin = () => `
            <div class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                <div class="bg-white border border-slate-200 p-8 rounded-2xl w-full max-w-sm text-center shadow-sm">
                    <h2 class="text-sm font-bold text-slate-400 mb-8 uppercase tracking-[0.3em]">Administrator Login</h2>
                    <input type="password" id="admin-pass" class="w-full p-4 border border-slate-200 rounded-xl mb-4 text-center font-bold focus:border-blue-500 outline-none text-xl transition-all" placeholder="Kata Sandi">
                    <button onclick="window.doAdminLogin()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-black transition-all text-[10px] tracking-[0.2em] uppercase">Masuk Dashboard</button>
                    <button onclick="window.setView('exam')" class="mt-8 text-[9px] text-slate-400 hover:text-slate-600 font-bold uppercase transition-colors tracking-widest">← Kembali ke Ujian</button>
                </div>
            </div>
        `;

        const renderAdminDashboard = () => `
            <div class="p-6 md:p-12 max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-12">
                    <div>
                        <h1 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Monitoring Siswa</h1>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Ujian Sekolah XII Informatika</p>
                    </div>
                    <button onclick="window.setView('exam')" class="bg-white border border-slate-200 px-6 py-2.5 rounded-lg text-[9px] font-bold hover:bg-slate-50 text-slate-500 tracking-[0.2em] uppercase transition-all">Keluar</button>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-[9px] uppercase tracking-[0.2em] font-bold border-b border-slate-200">
                                <tr>
                                    <th class="px-8 py-5">Siswa</th>
                                    <th class="px-8 py-5">Progres</th>
                                    <th class="px-8 py-5">Integritas</th>
                                    <th class="px-8 py-5 text-right">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-[13px]">
                                ${submissions.length === 0 ? '<tr><td colspan="4" class="px-8 py-20 text-center text-slate-300 italic font-medium">Menunggu data masuk dari siswa...</td></tr>' : ''}
                                ${submissions.map(s => {
                                    const result = calculateScore(s.answersA, s.essayScore || 0);
                                    return `
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-8 py-6">
                                            <p class="font-bold text-slate-800 text-sm">${s.name || 'Peserta Anonim'}</p>
                                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${s.class}</p>
                                        </td>
                                        <td class="px-8 py-6">
                                            <div class="flex items-center space-x-2">
                                                <span class="px-3 py-1 rounded-full text-[8px] font-bold ${s.finalSubmitted ? 'bg-green-100 text-green-700' : 'bg-blue-50 text-blue-600'} uppercase tracking-widest border border-current">
                                                    ${s.finalSubmitted ? 'SELESAI' : 'AKTIF'}
                                                </span>
                                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nilai: ${result.score}</span>
                                            </div>
                                        </td>
                                        <td class="px-8 py-6">
                                            <span class="font-bold text-[10px] ${s.tabSwitches > 0 ? 'text-red-500' : 'text-green-600'} uppercase tracking-widest flex items-center">
                                                <span class="w-1.5 h-1.5 rounded-full mr-2 ${s.tabSwitches > 0 ? 'bg-red-500' : 'bg-green-500'}"></span>
                                                ${s.tabSwitches}x Keluar
                                            </span>
                                        </td>
                                        <td class="px-8 py-6 text-right">
                                            <button onclick="window.inspectSubmission('${s.id}')" class="bg-slate-50 text-slate-500 hover:bg-slate-900 hover:text-white px-5 py-2 rounded-lg text-[9px] font-bold tracking-[0.2em] uppercase transition-all">Periksa</button>
                                        </td>
                                    </tr>
                                    `;
                                }).sort((a,b) => b.timestamp.localeCompare(a.timestamp)).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                ${selectedSubmission ? renderInspector() : ''}
            </div>
        `;

        const renderInspector = () => {
            const result = calculateScore(selectedSubmission.answersA, selectedSubmission.essayScore || 0);
            return `
            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50">
                <div class="bg-white rounded-2xl max-w-6xl w-full max-h-[95vh] overflow-hidden flex flex-col shadow-sm border border-slate-200">
                    <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
                        <div>
                            <h2 class="text-base font-bold text-slate-800 tracking-tight uppercase">${selectedSubmission.name}</h2>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Skor: ${result.score} (${result.grade}) | PG Benar: ${result.correct}/40</p>
                        </div>
                        <button onclick="window.closeInspector()" class="p-3 hover:bg-slate-50 rounded-xl transition-all text-slate-400 hover:text-slate-900 active:scale-90">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-8 lg:p-12 custom-scrollbar bg-slate-50/20">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                            <!-- PG Column -->
                            <div class="space-y-4">
                                <h3 class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-6">Lembar Pilihan Ganda</h3>
                                ${selectedSubmission.answersA.map((ans, i) => {
                                    const isCorrect = ans === questionsA[i].key;
                                    return `
                                        <div class="p-5 border border-slate-200 rounded-xl bg-white shadow-sm transition-all hover:border-slate-300">
                                            <p class="text-[11px] font-bold text-slate-700 leading-relaxed mb-4">${i+1}. ${questionsA[i].q}</p>
                                            <div class="flex flex-wrap gap-2 text-[10px] font-bold uppercase tracking-tight">
                                                <div class="px-3 py-1.5 rounded-lg border ${isCorrect ? 'bg-green-50 border-green-100 text-green-600' : ans ? 'bg-red-50 border-red-100 text-red-500' : 'bg-slate-50 border-slate-200 text-slate-400'}">
                                                    Siswa: ${ans || 'TIDAK DIISI'}
                                                </div>
                                                ${!isCorrect ? `<div class="px-3 py-1.5 rounded-lg border bg-blue-50 border-blue-100 text-blue-600 italic">Kunci: ${questionsA[i].key}</div>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>

                            <!-- Essay Column -->
                            <div class="space-y-6 lg:sticky lg:top-0">
                                <h3 class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-6">Lembar Jawaban Essay</h3>
                                <div class="space-y-6 mb-10">
                                    ${questionsB.map((q, i) => `
                                        <div class="p-6 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">Pertanyaan ${i+1}</p>
                                            <p class="text-[11px] font-bold text-slate-700 mb-4 leading-relaxed">${q}</p>
                                            <div class="text-[12px] text-slate-600 p-5 bg-slate-50 rounded-xl border border-slate-200 font-medium leading-relaxed italic border-l-4 border-l-slate-300 shadow-inner">
                                                ${selectedSubmission.answersB[i] || 'Peserta tidak mengisi jawaban pada nomor ini.'}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="bg-white p-8 rounded-2xl border border-blue-100 border-t-4 border-t-blue-500 shadow-sm">
                                    <div class="flex justify-between items-center mb-6">
                                        <label class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em] block">Skor Essay (0-20)</label>
                                        <span class="text-[8px] font-bold text-slate-300 uppercase tracking-widest italic">* Masukkan 1-20</span>
                                    </div>
                                    <input type="number" id="essay-score-input" value="${selectedSubmission.essayScore || 0}" min="0" max="20" class="w-full p-5 border-2 border-slate-100 rounded-xl mb-6 text-center text-4xl font-bold text-slate-800 outline-none focus:border-blue-400 transition-all shadow-inner">
                                    <button onclick="window.saveGrading('${selectedSubmission.id}')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all active:scale-[0.98] text-[10px] tracking-[0.3em] uppercase shadow-sm">Simpan Nilai Siswa</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        };

        // --- GLOBAL ACTIONS ---
        window.setView = (view) => {
            if (!isAuthReady) {
                window.showWarning("Sistem masih mencoba menghubungkan ke server Firebase. Mohon tunggu beberapa detik lagi.", "Koneksi Belum Siap");
                return;
            }
            currentView = view;
            if (view === 'admin_dashboard') {
                fetchSubmissions();
            } else {
                render();
            }
        };

        window.doAdminLogin = () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'admin123') { 
                window.setView('admin_dashboard'); 
            } else { 
                window.showWarning("Kata sandi salah. Akses monitor dilarang.", "Autentikasi Gagal"); 
            }
        };

        window.handleFinish = async () => {
            if (!isAuthReady) return;
            studentName = document.getElementById('input-name').value.trim();
            if (!studentName) return window.showWarning("Nama lengkap diperlukan untuk verifikasi data.", "Data Kosong");
            
            const answersA = [];
            for (let i = 0; i < questionsA.length; i++) {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                if (!sel) return window.showWarning(`Ada soal di Pilihan Ganda (Nomor ${i+1}) yang belum dijawab.`, "Belum Lengkap");
                answersA.push(sel.value);
            }
            const answersB = [];
            for (let i = 0; i < questionsB.length; i++) {
                const val = document.getElementById(`qb_${i}`).value.trim();
                if (!val) return window.showWarning(`Ada soal di Essay (Nomor ${i+1}) yang belum dijawab.`, "Belum Lengkap");
                answersB.push(val);
            }
            try {
                await saveDraft(true);
                currentView = 'finished';
                render();
            } catch (err) { window.showWarning("Gagal mengirim jawaban. Periksa koneksi internet Anda."); }
        };

        window.inspectSubmission = (id) => {
            selectedSubmission = submissions.find(s => s.id === id);
            render();
        };

        window.closeInspector = () => {
            selectedSubmission = null;
            render();
        };

        window.saveGrading = async (id) => {
            const score = document.getElementById('essay-score-input').value;
            if (score < 0 || score > 20) return window.showWarning("Nilai essay harus berada di rentang 0 sampai 20.");
            try {
                await updateEssayScore(id, score);
                window.showWarning("Nilai akhir siswa telah diperbarui.", "Berhasil");
            } catch (err) { console.error(err); }
        };

        render();
    </script>
</body>
</html>
