<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Sekolah Informatika - SMAS Tahfidz Al-Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .animate-save { animation: blink 1s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app">
        <!-- Loader Area -->
        <div id="loader" class="flex items-center justify-center min-h-screen text-center flex-col p-6">
            <div id="spinner" class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loader-text" class="text-slate-500 font-medium text-sm tracking-wide">Menginisialisasi Sistem Ujian...</p>
            
            <div id="setup-guide" class="hidden mt-6 p-6 bg-white rounded-2xl shadow-xl max-w-lg border border-orange-200">
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">Konfigurasi Firebase Belum Siap</h3>
                <p class="text-sm text-slate-600 mb-4 text-left">Pastikan Anda telah memasukkan Firebase Config dengan benar di dalam kode file HTML ini.</p>
                <p class="text-xs text-slate-400 italic text-left">Dapatkan di: console.firebase.google.com</p>
            </div>
        </div>
    </div>

    <!-- Modal Warning Kustom -->
    <div id="modal-warning" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl text-center transform transition-all border border-slate-100">
            <div id="warning-icon-container" class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg id="warning-svg" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 id="warning-title" class="text-xl font-bold text-slate-800 mb-3">Pesan Sistem</h3>
            <p id="warning-message" class="text-slate-600 mb-8 leading-relaxed text-sm font-medium"></p>
            <button onclick="window.closeWarning()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI DATABASE ---
        let firebaseConfig = {
            apiKey: "AIzaSyCdZliEF6yVmdQRNHhSRa4Z9YR1fn-CCYQ",
            authDomain: "chatting-22bb9.firebaseapp.com",
            projectId: "chatting-22bb9",
            storageBucket: "chatting-22bb9.firebasestorage.app",
            messagingSenderId: "540910795541",
            appId: "1:540910795541:web:785aff5846eab68636c71c"
        };
        let appId = 'ujian-informatika-001';

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'ujian-informatika-001';
            }
        } catch (e) {
            console.warn("Menggunakan config manual");
        }

        const app = firebaseConfig.apiKey ? initializeApp(firebaseConfig) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;

        // --- DATA SOAL ---
        const questionsA = [
            { q: "AI atau Kecerdasan Buatan adalah teknologi yang membuat komputer atau mesin bisa berpikir dan belajar seperti manusia.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Articial Intelligents adalah kepanjangan dari AI.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Salah" },
            { q: "TIK fokus pada pengembangan teknologi, sedangkan Informatika fokus pada penggunaan teknologi.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Information and Communication Tekhnology adalah kepanjangan dari TIK dalam bahasa inggris.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Hardware adalah semua komponen fisik komputer yang dapat dilihat dan disentuh. Hardware berfungsi sebagai alat input, output, pemroses, dan penyimpan data.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Perangkat keras jaringan yang berfungsi untuk menghubungkan beberapa komputer pada jaringan lokal (LAN) adalah...", opts: ["Router", "Switch/Hub", "Modem", "Repeater"], key: "Switch/Hub" },
            { q: "Topologi jaringan yang menggunakan satu kabel pusat sebagai media transmisi data adalah...", opts: ["Topologi Star", "Topologi Mesh", "Topologi Bus", "Topologi Ring"], key: "Topologi Bus" },
            { q: "Jenis kabel jaringan yang menggunakan cahaya untuk mengirimkan data dan memiliki kecepatan paling tinggi adalah...", opts: ["UTP", "Coaxial", "Fiber Optic", "STP"], key: "Fiber Optic" },
            { q: "Alamat unik yang dimiliki oleh setiap perangkat keras agar dapat teridentifikasi dalam jaringan disebut...", opts: ["IP Address", "MAC Address", "URL", "Gateway"], key: "MAC Address" },
            { q: "Jaringan komputer yang mencakup area satu kota atau wilayah tertentu disebut dengan...", opts: ["PAN", "LAN", "MAN", "WAN"], key: "MAN" },
            { q: "WWW merupakan singkatan dari istilah teknologi internet yaitu...", opts: ["World Wide Web", "World Web Wide", "Web World Wide", "Wide World Web"], key: "World Wide Web" },
            { q: "Protokol standar yang digunakan untuk mengirim pesan elektronik (email) melalui internet adalah...", opts: ["HTTP", "FTP", "SMTP", "TCP/IP"], key: "SMTP" },
            { q: "Manakah di bawah ini yang merupakan contoh dari mesin pencari (Search Engine)?", opts: ["Google & Bing", "Chrome & Firefox", "WhatsApp & Telegram", "Facebook & Instagram"], key: "Google & Bing" },
            { q: "Perangkat yang berfungsi untuk merubah sinyal analog menjadi digital dan sebaliknya agar komputer bisa terhubung ke internet adalah...", opts: ["Hub", "Modem", "Switch", "Router"], key: "Modem" },
            { q: "Sistem yang dirancang untuk mencegah akses yang tidak sah atau mencurigakan masuk ke dalam jaringan pribadi disebut...", opts: ["Firewall", "Antivirus", "Spyware", "Adware"], key: "Firewall" },
            { q: "Domain yang biasanya digunakan khusus untuk institusi pendidikan tinggi (Universitas) di Indonesia adalah...", opts: [".com", ".id", ".ac.id", ".go.id"], key: ".ac.id" },
            { q: "Browser web populer yang dikembangkan dan dimiliki oleh perusahaan Google adalah...", opts: ["Safari", "Opera", "Microsoft Edge", "Google Chrome"], key: "Google Chrome" },
            { q: "Satuan untuk mengukur kecepatan transfer data dalam sebuah jaringan internet adalah...", opts: ["Hertz (Hz)", "Byte (B)", "Bits per second (bps)", "Watt (W)"], key: "Bits per second (bps)" },
            { q: "Upaya penipuan untuk mendapatkan informasi data pribadi seperti password dan kartu kredit dengan menyamar sebagai institusi resmi melalui email/link palsu disebut...", opts: ["Hacking", "Phishing", "Spamming", "Cracking"], key: "Phishing" },
            { q: "Perangkat lunak berbahaya yang dirancang untuk merusak, mengganggu, atau mencuri data dari sistem komputer disebut...", opts: ["Software", "Firmware", "Malware", "Hardware"], key: "Malware" },
            { q: "Manakah di bawah ini yang merupakan perangkat keras keluaran (Output Device)?", opts: ["Scanner", "Monitor", "Keyboard", "Mouse"], key: "Monitor" },
            { q: "Unit pada komputer yang sering disebut sebagai 'Otak Komputer' karena fungsinya sebagai pusat pemrosesan adalah...", opts: ["Hardisk", "RAM", "CPU", "Power Supply"], key: "CPU" },
            { q: "Apa fungsi utama dari Sistem Operasi (Operating System) pada komputer?", opts: ["Mengelola hardware & software", "Membuat desain grafis", "Menyusun tabel data", "Mengedit video"], key: "Mengelola hardware & software" },
            { q: "File dengan ekstensi '.docx' merupakan format dokumen yang biasanya dibuat menggunakan aplikasi...", opts: ["Ms. Excel", "Ms. PowerPoint", "Ms. Word", "Ms. Access"], key: "Ms. Word" },
            { q: "Teknologi nirkabel jarak pendek yang umum digunakan untuk mentransfer file antar perangkat seluler adalah...", opts: ["Infrared", "Bluetooth", "Fiber Optic", "Broadband"], key: "Bluetooth" },
            { q: "Materi dasar yang pertama kali dipelajari mengenai teknologi informasi adalah...", opts: ["Pengenalan Informatika", "Sistem Database", "Kriptografi", "Robotika"], key: "Pengenalan Informatika" },
            { q: "Mengapa kita perlu belajar Informatika di sekolah?", opts: ["Agar bisa main game saja", "Mempersiapkan skill digital masa depan", "Hanya untuk syarat kelulusan", "Agar bisa merakit PC sendiri"], key: "Mempersiapkan skill digital masa depan" },
            { q: "Tiga komponen utama dalam Teknologi Informasi dan Komunikasi (TIK) adalah...", opts: ["Hardware, Software, Brainware", "Monitor, Mouse, Keyboard", "Google, Yahoo, Bing", "Excel, Word, PowerPoint"], key: "Hardware, Software, Brainware" },
            { q: "Internet sebagai jaringan global yang kita kenal sekarang, awal cikal bakalnya ditemukan pada tahun...", opts: ["1945", "1969 (ARPANET)", "1998", "2010"], key: "1969 (ARPANET)" },
            { q: "Apa perbedaan utama antara jaringan lokal (LAN) dengan internet?", opts: ["LAN menggunakan kabel, internet tidak", "Internet cakupannya global, LAN terbatas area kecil", "LAN lebih lambat dari internet", "Internet hanya untuk media sosial"], key: "Internet cakupannya global, LAN terbatas area kecil" },
            { q: "Apakah kepanjangan dari istilah jaringan LAN?", opts: ["Local Area Network", "Link Area Node", "Light Access Net", "Large Area Network"], key: "Local Area Network" },
            { q: "Manakah yang merupakan kumpulan topologi jaringan komputer?", opts: ["Bus, Star, Ring, Mesh", "Keyboard, Mouse, Monitor", "Windows, Linux, Android", "Word, Excel, Access"], key: "Bus, Star, Ring, Mesh" },
            { q: "Di bawah ini yang merupakan jenis platform media sosial populer adalah...", opts: ["WhatsApp, Facebook, Instagram", "Chrome, Firefox, Safari", "Windows, MacOS, Linux", "Photoshop, Corel, Canva"], key: "WhatsApp, Facebook, Instagram" },
            { q: "Apa salah satu manfaat positif dari penggunaan media sosial?", opts: ["Mempercepat komunikasi dan berbagi informasi", "Menghabiskan waktu luang", "Memperbanyak kuota internet", "Melihat foto orang lain saja"], key: "Mempercepat komunikasi dan berbagi informasi" },
            { q: "Salah satu dampak negatif dari media sosial jika tidak digunakan dengan bijak adalah...", opts: ["Penyebaran berita bohong (Hoax)", "Memudahkan mencari materi belajar", "Mendapatkan banyak teman", "Media promosi gratis"], key: "Penyebaran berita bohong (Hoax)" },
            { q: "Proses mengubah data menjadi kode rahasia agar tidak mudah dibaca oleh pihak yang tidak berwenang disebut...", opts: ["Enkripsi", "Deskripsi", "Kompresi", "Instalasi"], key: "Enkripsi" },
            { q: "Manakah yang merupakan media penyimpanan data permanen dengan kecepatan akses paling cepat saat ini?", opts: ["Hardisk Drive (HDD)", "Solid State Drive (SSD)", "Flashdisk", "Floppy Disk"], key: "Solid State Drive (SSD)" },
            { q: "Dalam pemrograman, tempat untuk menyimpan nilai data yang dapat berubah-ubah selama program dijalankan disebut...", opts: ["Konstanta", "Variabel", "Looping", "Function"], key: "Variabel" },
            { q: "Etika dan tanggung jawab dalam menggunakan teknologi informasi secara bijak dikenal dengan istilah...", opts: ["Digital Citizenship", "Cyber Crime", "Social Media Admin", "IT Support"], key: "Digital Citizenship" },
            { q: "Teknologi yang memungkinkan pengolahan data dalam skala yang sangat besar dan kompleks disebut...", opts: ["Small Data", "Big Data", "Manual Data", "Paper Data"], key: "Big Data" }
        ];

        const questionsB = [
            "Jelaskan secara singkat apa yang dimaksud dengan Cloud Computing!",
            "Sebutkan 2 contoh perangkat input (masukan) pada komputer!",
            "Apa yang dimaksud dengan algoritma dalam konteks pemrograman?",
            "Mengapa kita perlu menggunakan kata sandi (password) yang kuat untuk akun media sosial?",
            "Tuliskan langkah-langkah sederhana mengirim file menggunakan layanan Google Drive!"
        ];

        // --- APP STATE ---
        let currentView = 'exam';
        let currentUser = null;
        let tabSwitchCount = 0;
        let studentName = "";
        let studentClass = "XII A";
        let submissions = [];
        let selectedSubmission = null;
        let isAuthReady = false;
        let lastSavedData = null;
        let autoSaveTimer = null;

        // --- AUTH INIT ---
        const initAuth = async () => {
            if (!auth) {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('loader-text').classList.add('hidden');
                document.getElementById('setup-guide').classList.remove('hidden');
                return;
            }
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    isAuthReady = true;
                    if (user) await loadExistingDraft();
                    render();
                });
            } catch (error) {
                console.error("Auth Error:", error);
                window.showWarning("Gagal mengautentikasi ke server. Periksa Rules Anda.", "Auth Error");
            }
        };
        initAuth();

        // --- POP-UP LOGIC ---
        window.showWarning = (msg, title = "Peringatan!") => {
            document.getElementById('warning-title').textContent = title;
            document.getElementById('warning-message').textContent = msg;
            document.getElementById('modal-warning').classList.remove('hidden');
        };

        window.closeWarning = () => {
            document.getElementById('modal-warning').classList.add('hidden');
        };

        // --- AUTO-SAVE LOGIC ---
        const loadExistingDraft = async () => {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (!data.finalSubmitted) {
                        studentName = data.name || "";
                        studentClass = data.class || "XII A";
                        tabSwitchCount = data.tabSwitches || 0;
                        lastSavedData = data;
                    } else {
                        currentView = 'finished';
                        studentName = data.name;
                        tabSwitchCount = data.tabSwitches;
                    }
                }
            } catch (e) { console.error(e); }
        };

        window.triggerAutoSave = () => {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                await saveDraft();
            }, 1000);
        };

        const saveDraft = async (isFinal = false) => {
            if (!currentUser || !db || currentView !== 'exam') return;
            
            const nameField = document.getElementById('input-name');
            const classField = document.getElementById('input-class');
            
            const currentName = nameField ? nameField.value.trim() : studentName;
            const currentClass = classField ? classField.value : studentClass;

            const answersA = [];
            questionsA.forEach((_, i) => {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                answersA.push(sel ? sel.value : "");
            });

            const answersB = [];
            questionsB.forEach((_, i) => {
                const val = document.getElementById(`qb_${i}`);
                answersB.push(val ? val.value.trim() : "");
            });

            const data = {
                name: currentName,
                class: currentClass,
                tabSwitches: tabSwitchCount,
                answersA,
                answersB,
                uid: currentUser.uid,
                timestamp: new Date().toISOString(),
                finalSubmitted: isFinal,
                graded: isFinal ? false : (lastSavedData?.graded || false),
                essayScore: lastSavedData?.essayScore || 0
            };

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                await setDoc(docRef, data);
                lastSavedData = data;
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.classList.remove('hidden');
                    indicator.classList.add('flex', 'animate-save');
                    setTimeout(() => indicator.classList.remove('animate-save'), 1000);
                }
            } catch (e) {
                console.error("Save Error:", e);
                if (e.code === 'permission-denied') {
                    window.showWarning("Rules Firebase Anda kedaluwarsa. Data tidak bisa disimpan.", "Permission Error");
                }
            }
        };

        // --- LOGIC FUNCTIONS ---
        window.onblur = () => {
            if (currentView === 'exam' && isAuthReady) {
                tabSwitchCount++;
                saveDraft();
                window.showWarning(`Anda keluar dari halaman ujian! (Pelanggaran: ${tabSwitchCount} kali)`, "Sistem Keamanan");
            }
        };

        const calculateScore = (answersA, essayScore = 0) => {
            let correctCount = 0;
            answersA.forEach((ans, i) => {
                if (ans === questionsA[i].key) correctCount++;
            });
            const pgScore = correctCount * 2;
            const rawScore = pgScore + parseFloat(essayScore); 
            const finalScore = Math.round((rawScore / 100) * 88 + 10);
            let grade = 'D';
            if (finalScore >= 90) grade = 'A';
            else if (finalScore >= 80) grade = 'B';
            else if (finalScore >= 70) grade = 'C';
            return { score: finalScore, grade, correct: correctCount, raw: rawScore };
        };

        const fetchSubmissions = async () => {
            if (!db || !currentUser) return;
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
                submissions = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            } catch (err) {
                console.error("Fetch Error:", err);
                if (err.code === 'permission-denied') {
                    window.showWarning("Rules Firebase Anda Menolak Akses. Periksa masa berlaku Rules Anda.", "Akses Ditolak");
                }
            }
        };

        const updateEssayScore = async (id, newEssayScore) => {
            if (!db || !currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', id);
            await updateDoc(docRef, {
                essayScore: parseFloat(newEssayScore),
                graded: true
            });
            fetchSubmissions();
            selectedSubmission = null;
        };

        // --- RENDERER ---
        const render = () => {
            const root = document.getElementById('app');
            if (!isAuthReady) return;

            if (currentView === 'exam') {
                root.innerHTML = renderExam();
                if (lastSavedData) {
                    document.getElementById('input-name').value = lastSavedData.name || "";
                    document.getElementById('input-class').value = lastSavedData.class || "XII A";
                    lastSavedData.answersA.forEach((ans, i) => {
                        if (ans) {
                            const radio = document.querySelector(`input[name="qa_${i}"][value="${ans}"]`);
                            if (radio) radio.checked = true;
                        }
                    });
                    lastSavedData.answersB.forEach((ans, i) => {
                        if (ans) document.getElementById(`qb_${i}`).value = ans;
                    });
                }
            } else if (currentView === 'finished') {
                root.innerHTML = renderFinished();
            } else if (currentView === 'admin_login') {
                root.innerHTML = renderAdminLogin();
            } else if (currentView === 'admin_dashboard') {
                root.innerHTML = renderAdminDashboard();
            }
        };

        const renderExam = () => `
            <header class="bg-blue-900 text-white py-12 px-4 shadow-2xl mb-8 relative border-b-4 border-blue-400">
                <button onclick="window.setView('admin_login')" class="absolute top-2 right-2 text-[8px] opacity-10 hover:opacity-100 p-2">ADMIN PANEL</button>
                <div class="max-w-4xl mx-auto text-center">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaC7zNuBILaC544879xnoWvGCnxA9Fc83PCg&s" class="h-24 mx-auto mb-6 rounded-2xl shadow-lg border-2 border-white/20">
                    <h2 class="text-[10px] font-bold uppercase opacity-60 tracking-[0.3em] mb-2 leading-relaxed">Pemerintah Provinsi Sulawesi Selatan</h2>
                    <h1 class="text-xl md:text-3xl font-black mt-1 leading-tight tracking-tight uppercase px-4">SMAS TAHFIDZ AL-QURAN WAHDAH ISLAMIYAH ANABANUA</h1>
                    <p class="text-xs mt-4 opacity-80 font-semibold bg-blue-800/50 inline-block px-4 py-1 rounded-full border border-blue-700">Ujian Sekolah: Informatika (XII)</p>
                </div>
            </header>

            <main class="max-w-4xl mx-auto px-4 pb-40">
                <section class="glass-card p-8 rounded-[2rem] mb-8 border-l-[6px] border-blue-500 shadow-xl">
                    <h3 class="font-black text-slate-900 mb-6 flex items-center text-sm uppercase tracking-widest">
                        <span class="w-10 h-10 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mr-4 text-xs font-black shadow-inner">01</span>
                        Validasi Identitas
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nama Lengkap Siswa</label>
                            <input type="text" id="input-name" oninput="window.triggerAutoSave()" placeholder="Contoh: Muhammad Ali" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-slate-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Kelas Aktif</label>
                            <select id="input-class" onchange="window.triggerAutoSave()" class="w-full p-4 border border-slate-200 rounded-2xl outline-none bg-white font-bold text-slate-700">
                                <option>XII A</option>
                                <option>XII B</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="glass-card p-2 rounded-[2.5rem] mb-8 shadow-sm border border-slate-100">
                    <div class="p-6 bg-slate-50/50 rounded-t-[2.5rem] border-b border-slate-100">
                         <h3 class="font-black text-slate-800 flex items-center text-sm uppercase tracking-widest">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mr-3 text-xs font-black">A</span>
                            Bagian I: Pilihan Ganda (80 Poin)
                        </h3>
                    </div>
                    <div class="p-6 space-y-4">
                        ${questionsA.map((q, i) => `
                            <div class="p-6 border border-slate-100 rounded-[2rem] transition-all bg-white hover:shadow-lg hover:border-blue-100 group">
                                <p class="font-bold text-slate-800 mb-6 leading-relaxed text-sm"><span class="text-blue-500 font-black mr-2">${i+1}.</span> ${q.q}</p>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    ${q.opts.map(opt => `
                                        <label class="flex items-center p-4 border-2 rounded-2xl hover:bg-blue-50 cursor-pointer transition-all border-slate-100 bg-white group-hover:border-slate-200">
                                            <input type="radio" name="qa_${i}" value="${opt}" onchange="window.triggerAutoSave()" class="w-5 h-5 text-blue-600 focus:ring-blue-500 border-2">
                                            <span class="ml-3 text-xs font-black text-slate-500 uppercase tracking-tighter">${opt}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="glass-card p-2 rounded-[2.5rem] mb-12 shadow-sm border border-slate-100">
                    <div class="p-6 bg-slate-50/50 rounded-t-[2.5rem] border-b border-slate-100">
                         <h3 class="font-black text-slate-800 flex items-center text-sm uppercase tracking-widest">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mr-3 text-xs font-black">B</span>
                            Bagian II: Essay (20 Poin)
                        </h3>
                    </div>
                    <div class="p-8 space-y-10">
                        ${questionsB.map((q, i) => `
                            <div class="space-y-4">
                                <p class="font-black text-slate-700 mb-3 text-sm leading-relaxed"><span class="text-blue-500 font-black mr-2">${i+1}.</span> ${q}</p>
                                <textarea id="qb_${i}" oninput="window.triggerAutoSave()" class="w-full p-6 border-2 border-slate-100 rounded-[2rem] outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-200 shadow-inner transition-all text-sm font-bold text-slate-700" rows="4" placeholder="Ketik jawaban Anda di sini secara lengkap..."></textarea>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <button onclick="window.handleFinish()" class="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] shadow-[0_20px_40px_-10px_rgba(15,23,42,0.3)] hover:bg-black transition-all transform active:scale-95 text-base tracking-[0.2em] uppercase">
                    Kirim Jawaban Final
                </button>
            </main>

            <div id="save-indicator" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-xl px-8 py-4 rounded-full shadow-2xl border-2 border-blue-50 hidden items-center space-x-4 z-50">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_12px_rgba(34,197,94,1)]"></div>
                <span class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em]">Data Tersimpan</span>
            </div>
        `;

        const renderFinished = () => `
            <div class="min-h-screen flex items-center justify-center p-6 text-center bg-slate-100">
                <div class="glass-card p-14 rounded-[3.5rem] max-w-lg w-full shadow-2xl border-[6px] border-white">
                    <div class="w-28 h-28 bg-green-50 text-green-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-10 rotate-6 shadow-xl border-4 border-white">
                        <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-4xl font-black text-slate-900 mb-6 tracking-tight uppercase">Selesai!</h2>
                    <p class="text-slate-500 mb-12 leading-relaxed font-bold">Terima kasih, <b>${studentName}</b>. Lembar jawaban Anda telah diterima dan diarsipkan oleh server sekolah.</p>
                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-6 rounded-[2rem] font-black hover:bg-blue-700 transition-all shadow-xl active:scale-95 text-xs uppercase tracking-[0.3em]">Tutup Halaman</button>
                </div>
            </div>
        `;

        const renderAdminLogin = () => `
            <div class="min-h-screen flex items-center justify-center p-6 bg-slate-200 font-sans">
                <div class="glass-card p-12 rounded-[3.5rem] w-full max-w-md text-center shadow-2xl border-[8px] border-white">
                    <div class="w-20 h-20 bg-slate-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-10 shadow-2xl transform -rotate-12">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">Login Guru</h2>
                    <p class="text-[10px] text-slate-400 mb-12 font-black uppercase tracking-[0.2em]">Monitoring Sistem SMAS Tahfidz</p>
                    <input type="password" id="admin-pass" class="w-full p-6 border-2 border-slate-100 rounded-[2rem] mb-8 text-center text-2xl font-black focus:ring-8 focus:ring-blue-100 focus:border-blue-200 outline-none transition-all shadow-inner" placeholder="SANDI ADMIN">
                    <button onclick="window.doAdminLogin()" class="w-full bg-blue-600 text-white p-6 rounded-[2rem] font-black hover:bg-blue-700 transition-all shadow-2xl active:scale-95 uppercase tracking-[0.25em] text-xs">Akses Dashboard</button>
                    <button onclick="window.setView('exam')" class="mt-10 text-[10px] text-slate-400 hover:text-slate-600 font-black uppercase tracking-[0.2em] transition-colors">← Batal & Kembali</button>
                </div>
            </div>
        `;

        const renderAdminDashboard = () => `
            <div class="p-8 md:p-16 max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
                    <div>
                        <div class="flex items-center space-x-4 mb-4">
                            <span class="px-5 py-2 bg-slate-900 text-white rounded-2xl text-[10px] font-black tracking-[0.3em] uppercase shadow-lg">Administrator</span>
                        </div>
                        <h1 class="text-5xl font-black text-slate-900 tracking-tighter leading-none">Status Ujian</h1>
                        <p class="text-slate-400 text-sm mt-4 font-bold italic tracking-wide">Monitoring Real-time SMAS Tahfidz Al-Quran</p>
                    </div>
                    <button onclick="window.setView('exam')" class="bg-white border-4 border-white px-10 py-5 rounded-[2rem] text-[10px] font-black shadow-2xl hover:bg-slate-50 transition-all active:scale-95 uppercase tracking-[0.3em] text-slate-700">Tutup Panel</button>
                </div>

                <div class="glass-card rounded-[3.5rem] overflow-hidden shadow-2xl border-[6px] border-white">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-[0.3em] font-black">
                                <tr>
                                    <th class="px-12 py-10">Nama Lengkap Siswa</th>
                                    <th class="px-12 py-10">Status Aktif</th>
                                    <th class="px-12 py-10">Kejujuran</th>
                                    <th class="px-12 py-10 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm font-bold">
                                ${submissions.length === 0 ? '<tr><td colspan="4" class="px-12 py-32 text-center text-slate-300 italic text-2xl font-black tracking-tighter uppercase opacity-50">Menunggu Siswa Mengirim Jawaban...</td></tr>' : ''}
                                ${submissions.map(s => {
                                    const result = calculateScore(s.answersA, s.essayScore || 0);
                                    return `
                                    <tr class="hover:bg-blue-50/30 transition-all">
                                        <td class="px-12 py-10">
                                            <p class="font-black text-slate-900 text-xl tracking-tight">${s.name || '<span class="text-slate-300">Belum Mengisi Nama</span>'}</p>
                                            <p class="text-[10px] text-slate-400 font-black tracking-[0.3em] uppercase mt-2">${s.class}</p>
                                        </td>
                                        <td class="px-12 py-10">
                                            <div class="flex flex-col space-y-2">
                                                <span class="px-5 py-2 w-max rounded-full text-[9px] font-black shadow-sm ${s.finalSubmitted ? 'bg-green-500 text-white' : 'bg-blue-500 text-white'} uppercase tracking-[0.2em]">
                                                    ${s.finalSubmitted ? 'Selesai' : 'Mengerjakan'}
                                                </span>
                                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Skor Sementara: <span class="text-blue-600 font-black">${result.score}</span></p>
                                            </div>
                                        </td>
                                        <td class="px-12 py-10">
                                            <div class="flex items-center space-x-4">
                                                <div class="w-4 h-4 rounded-full ${s.tabSwitches > 0 ? 'bg-red-500 animate-pulse shadow-[0_0_15px_#ef4444]' : 'bg-green-500 shadow-[0_0_15px_#22c55e]'}"></div>
                                                <span class="font-black text-xs ${s.tabSwitches > 0 ? 'text-red-600' : 'text-slate-800'} uppercase tracking-[0.1em]">${s.tabSwitches}x Pindah Tab</span>
                                            </div>
                                        </td>
                                        <td class="px-12 py-10 text-center">
                                            <button onclick="window.inspectSubmission('${s.id}')" class="bg-slate-900 text-white hover:bg-blue-600 px-10 py-4 rounded-2xl text-[10px] font-black tracking-[0.3em] uppercase transition-all shadow-xl active:scale-95">Periksa</button>
                                        </td>
                                    </tr>
                                    `;
                                }).sort((a,b) => b.timestamp.localeCompare(a.timestamp)).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                ${selectedSubmission ? renderInspector() : ''}
            </div>
        `;

        const renderInspector = () => {
            const result = calculateScore(selectedSubmission.answersA, selectedSubmission.essayScore || 0);
            return `
            <div class="fixed inset-0 bg-black/90 backdrop-blur-2xl flex items-center justify-center p-4 z-50 overflow-y-auto">
                <div class="bg-white rounded-[4rem] max-w-7xl w-full my-8 overflow-hidden flex flex-col shadow-[0_35px_100px_-15px_rgba(0,0,0,0.5)] border-[10px] border-white">
                    <div class="p-12 border-b-4 border-slate-50 flex justify-between items-start bg-slate-50/50">
                        <div>
                            <div class="flex items-center space-x-3 mb-4 text-[10px] font-black uppercase tracking-[0.3em] text-blue-600">
                                <span>Detail Hasil Ujian</span>
                                <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span>
                                <span>ID: ${selectedSubmission.uid.substring(0,8)}</span>
                            </div>
                            <h2 class="text-5xl font-black text-slate-900 tracking-tighter leading-none mb-6">${selectedSubmission.name}</h2>
                            <div class="flex flex-wrap gap-4 mt-3">
                                <span class="text-[10px] bg-slate-900 text-white px-6 py-2.5 rounded-2xl font-black tracking-[0.2em] uppercase shadow-lg">${selectedSubmission.class}</span>
                                <span class="text-[10px] bg-blue-600 px-6 py-2.5 rounded-2xl font-black text-white shadow-xl uppercase tracking-[0.2em]">Skor Akhir: ${result.score} (${result.grade})</span>
                                <span class="text-[10px] bg-white border-2 border-slate-100 px-6 py-2.5 rounded-2xl font-black text-slate-400 uppercase tracking-[0.2em]">PG Benar: ${result.correct}/40</span>
                            </div>
                        </div>
                        <button onclick="window.closeInspector()" class="p-6 hover:bg-red-50 text-slate-200 hover:text-red-500 rounded-[3rem] transition-all active:scale-75 transform hover:rotate-90">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-12 lg:p-20 grid grid-cols-1 lg:grid-cols-2 gap-20 bg-slate-50/30 custom-scrollbar">
                        <div>
                            <h3 class="font-black text-slate-900 mb-10 flex items-center text-xs uppercase tracking-[0.3em]">
                                <span class="w-10 h-10 bg-slate-900 text-white rounded-2xl flex items-center justify-center mr-5 text-xs font-black shadow-xl">A</span>
                                Analisis Pilihan Ganda
                            </h3>
                            <div class="space-y-6">
                                ${selectedSubmission.answersA.map((ans, i) => {
                                    const isCorrect = ans === questionsA[i].key;
                                    return `
                                        <div class="p-8 border-[3px] rounded-[2.5rem] ${isCorrect ? 'bg-white border-green-100' : ans ? 'bg-white border-red-100' : 'bg-slate-100 border-slate-200'} transition-all shadow-sm hover:shadow-xl">
                                            <p class="text-xs font-black text-slate-800 leading-relaxed mb-6 uppercase tracking-tight">${i+1}. ${questionsA[i].q}</p>
                                            <div class="flex flex-col space-y-3">
                                                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Jawaban Siswa</span>
                                                    <span class="text-[11px] font-black ${isCorrect ? 'text-green-600' : 'text-red-500'} uppercase">${ans || 'KOSONG'}</span>
                                                </div>
                                                ${!isCorrect ? `
                                                <div class="flex items-center justify-between bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                                                    <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Kunci Jawaban</span>
                                                    <span class="text-[11px] font-black text-blue-600 uppercase">${questionsA[i].key}</span>
                                                </div>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="flex flex-col space-y-12">
                            <div class="bg-white p-12 rounded-[3.5rem] border-4 border-slate-50 shadow-2xl flex flex-col">
                                <h3 class="font-black text-slate-900 mb-10 flex items-center text-xs uppercase tracking-[0.3em]">
                                    <span class="w-10 h-10 bg-slate-900 text-white rounded-2xl flex items-center justify-center mr-5 text-xs font-black shadow-xl">B</span>
                                    Lembar Jawaban Essay
                                </h3>
                                <div class="space-y-12 flex-1 mb-12">
                                    ${questionsB.map((q, i) => `
                                        <div class="space-y-6">
                                            <div class="flex items-center space-x-3">
                                                <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-[10px] font-black">${i+1}</span>
                                                <p class="text-[11px] font-black text-slate-400 tracking-widest uppercase">Pertanyaan</p>
                                            </div>
                                            <p class="text-sm font-black text-slate-800 leading-relaxed">${q}</p>
                                            <div class="text-sm leading-relaxed text-slate-600 font-bold bg-slate-50 p-8 rounded-[2.5rem] border-2 border-slate-100 shadow-inner italic">
                                                ${selectedSubmission.answersB[i] ? selectedSubmission.answersB[i] : '<span class="text-slate-300 tracking-widest uppercase text-[10px]">Jawaban tidak diisi oleh siswa</span>'}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="pt-12 border-t-8 border-dotted border-slate-50 mt-auto">
                                    <div class="flex items-center justify-between mb-8">
                                        <label class="text-[11px] font-black uppercase tracking-[0.4em] text-blue-600 ml-2">Penilaian Manual (0-20)</label>
                                        <div class="flex items-center text-[9px] font-black text-slate-300 uppercase tracking-widest bg-slate-50 px-4 py-2 rounded-full border border-slate-100 italic">Apresiasi Usaha: Min 1 Poin</div>
                                    </div>
                                    <input type="number" id="essay-score-input" value="${selectedSubmission.essayScore || 0}" min="0" max="20" class="w-full p-8 border-[6px] border-blue-50 rounded-[3rem] mb-10 text-center text-6xl font-black text-blue-600 shadow-inner focus:ring-[20px] focus:ring-blue-100 outline-none transition-all">
                                    <button onclick="window.saveGrading('${selectedSubmission.id}')" class="w-full bg-blue-600 text-white font-black py-8 rounded-[3rem] shadow-2xl hover:bg-blue-700 transition-all active:scale-95 text-xs uppercase tracking-[0.5em]">Simpan & Update Nilai</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        };

        // --- GLOBAL ACTIONS ---
        window.setView = (view) => {
            if (!isAuthReady) {
                window.showWarning("Sistem belum terkoneksi sepenuhnya. Mohon tunggu beberapa detik.", "Sinkronisasi Server");
                return;
            }
            currentView = view;
            if (view === 'admin_dashboard') fetchSubmissions();
            else render();
        };

        window.doAdminLogin = () => {
            const passField = document.getElementById('admin-pass');
            const pass = passField.value;
            
            if (pass === 'admin123') { 
                window.setView('admin_dashboard');
            } else {
                window.showWarning("Kata sandi salah. Akses ditolak sistem.", "Akses Dibatasi");
                passField.value = "";
                passField.focus();
            }
        };

        window.handleFinish = async () => {
            if (!isAuthReady) return;
            studentName = document.getElementById('input-name').value.trim();
            studentClass = document.getElementById('input-class').value;

            if (!studentName) return window.showWarning("Nama lengkap wajib diisi untuk verifikasi database.", "Data Tidak Lengkap");

            const answersA = [];
            for (let i = 0; i < questionsA.length; i++) {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                if (!sel) return window.showWarning(`Soal Pilihan Ganda nomor ${i+1} belum dijawab.`, "Kewajiban Menjawab");
                answersA.push(sel.value);
            }

            const answersB = [];
            for (let i = 0; i < questionsB.length; i++) {
                const val = document.getElementById(`qb_${i}`).value.trim();
                if (!val) return window.showWarning(`Soal Essay nomor ${i+1} belum dijawab.`, "Kewajiban Menjawab");
                answersB.push(val);
            }

            try {
                await saveDraft(true);
                currentView = 'finished';
                render();
            } catch (err) {
                window.showWarning("Gagal mengirim data karena gangguan jaringan atau Rules kedaluwarsa.", "Error Fatal");
            }
        };

        window.inspectSubmission = (id) => {
            selectedSubmission = submissions.find(s => s.id === id);
            render();
        };

        window.closeInspector = () => {
            selectedSubmission = null;
            render();
        };

        window.saveGrading = async (id) => {
            const score = document.getElementById('essay-score-input').value;
            if (score < 0 || score > 20) return window.showWarning("Skor essay tidak valid (Harus 0-20).", "Input Salah");
            try {
                await updateEssayScore(id, score);
                window.showWarning("Nilai essay berhasil diperbarui di database.", "Berhasil");
            } catch (err) {
                window.showWarning("Gagal menyimpan nilai. Periksa Rules Firebase Anda.", "Error Rules");
            }
        };

        render();
    </script>
</body>
</html>
