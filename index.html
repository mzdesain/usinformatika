<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Sekolah Informatika - SMAS Tahfidz Al-Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .minimal-border { border: 1px solid #f1f5f9; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .animate-save { animation: blink 1s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-white min-h-screen text-slate-800">

    <div id="app">
        <!-- Loader Awal -->
        <div id="loader" class="flex items-center justify-center min-h-screen text-center flex-col p-6">
            <div class="w-6 h-6 border-2 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 text-[10px] tracking-[0.2em] uppercase font-bold">Menginisialisasi...</p>
        </div>
    </div>

    <!-- Modal Warning Minimalis -->
    <div id="modal-warning" class="fixed inset-0 bg-slate-900/10 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-xl max-w-sm w-full p-6 border border-slate-200 text-center shadow-sm transform transition-all">
            <h3 id="warning-title" class="text-xs font-bold text-slate-900 mb-2 uppercase tracking-widest">Informasi</h3>
            <p id="warning-message" class="text-slate-500 mb-6 text-[11px] leading-relaxed"></p>
            <button onclick="window.closeWarning()" class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-bold hover:bg-black transition-all text-[10px] tracking-widest uppercase">Tutup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCdZliEF6yVmdQRNHhSRa4Z9YR1fn-CCYQ",
            authDomain: "chatting-22bb9.firebaseapp.com",
            projectId: "chatting-22bb9",
            storageBucket: "chatting-22bb9.firebasestorage.app",
            messagingSenderId: "540910795541",
            appId: "1:540910795541:web:785aff5846eab68636c71c"
        };
        const appId = 'ujian-informatika-001';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- DATA SOAL ---
        const questionsA = [
            { q: "AI atau Kecerdasan Buatan adalah teknologi yang membuat komputer atau mesin bisa berpikir dan belajar seperti manusia.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Articial Intelligents adalah kepanjangan dari AI.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Salah" },
            { q: "TIK fokus pada pengembangan teknologi, sedangkan Informatika fokus pada penggunaan teknologi.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Information and Communication Tekhnology adalah kepanjangan dari TIK dalam bahasa inggris.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Hardware adalah semua komponen fisik komputer yang dapat dilihat dan disentuh. Hardware berfungsi sebagai alat input, output, pemroses, dan penyimpan data.", opts: ["Benar", "Salah", "Kurang Tepat"], key: "Benar" },
            { q: "Perangkat keras jaringan yang berfungsi untuk menghubungkan beberapa komputer pada jaringan lokal (LAN) adalah...", opts: ["Router", "Switch/Hub", "Modem", "Repeater"], key: "Switch/Hub" },
            { q: "Topologi jaringan yang menggunakan satu kabel pusat sebagai media transmisi data adalah...", opts: ["Topologi Star", "Topologi Mesh", "Topologi Bus", "Topologi Ring"], key: "Topologi Bus" },
            { q: "Jenis kabel jaringan yang menggunakan cahaya untuk mengirimkan data dan memiliki kecepatan paling tinggi adalah...", opts: ["UTP", "Coaxial", "Fiber Optic", "STP"], key: "Fiber Optic" },
            { q: "Alamat unik yang dimiliki oleh setiap perangkat keras agar dapat teridentifikasi dalam jaringan disebut...", opts: ["IP Address", "MAC Address", "URL", "Gateway"], key: "MAC Address" },
            { q: "Jaringan komputer yang mencakup area satu kota atau wilayah tertentu disebut dengan...", opts: ["PAN", "LAN", "MAN", "WAN"], key: "MAN" },
            { q: "WWW merupakan singkatan dari istilah teknologi internet yaitu...", opts: ["World Wide Web", "World Web Wide", "Web World Wide", "Wide World Web"], key: "World Wide Web" },
            { q: "Protokol standar yang digunakan untuk mengirim pesan elektronik (email) melalui internet adalah...", opts: ["HTTP", "FTP", "SMTP", "TCP/IP"], key: "SMTP" },
            { q: "Manakah di bawah ini yang merupakan contoh dari mesin pencari (Search Engine)?", opts: ["Google & Bing", "Chrome & Firefox", "WhatsApp & Telegram", "Facebook & Instagram"], key: "Google & Bing" },
            { q: "Perangkat yang berfungsi untuk merubah sinyal analog menjadi digital dan sebaliknya agar komputer bisa terhubung ke internet adalah...", opts: ["Hub", "Modem", "Switch", "Router"], key: "Modem" },
            { q: "Sistem yang dirancang untuk mencegah akses yang tidak sah atau mencurigakan masuk ke dalam jaringan pribadi disebut...", opts: ["Firewall", "Antivirus", "Spyware", "Adware"], key: "Firewall" },
            { q: "Domain yang biasanya digunakan khusus untuk institusi pendidikan tinggi (Universitas) di Indonesia adalah...", opts: [".com", ".id", ".ac.id", ".go.id"], key: ".ac.id" },
            { q: "Browser web populer yang dikembangkan dan dimiliki oleh perusahaan Google adalah...", opts: ["Safari", "Opera", "Microsoft Edge", "Google Chrome"], key: "Google Chrome" },
            { q: "Satuan untuk mengukur kecepatan transfer data dalam sebuah jaringan internet adalah...", opts: ["Hertz (Hz)", "Byte (B)", "Bits per second (bps)", "Watt (W)"], key: "Bits per second (bps)" },
            { q: "Upaya penipuan untuk mendapatkan informasi data pribadi seperti password dan kartu kredit dengan menyamar sebagai institusi resmi melalui email/link palsu disebut...", opts: ["Hacking", "Phishing", "Spamming", "Cracking"], key: "Phishing" },
            { q: "Perangkat lunak berbahaya yang dirancang untuk merusak, mengganggu, atau mencuri data dari sistem komputer disebut...", opts: ["Software", "Firmware", "Malware", "Hardware"], key: "Malware" },
            { q: "Manakah di bawah ini yang merupakan perangkat keras keluaran (Output Device)?", opts: ["Scanner", "Monitor", "Keyboard", "Mouse"], key: "Monitor" },
            { q: "Unit pada komputer yang sering disebut sebagai 'Otak Komputer' karena fungsinya sebagai pusat pemrosesan adalah...", opts: ["Hardisk", "RAM", "CPU", "Power Supply"], key: "CPU" },
            { q: "Apa fungsi utama dari Sistem Operasi (Operating System) pada komputer?", opts: ["Mengelola hardware & software", "Membuat desain grafis", "Menyusun tabel data", "Mengedit video"], key: "Mengelola hardware & software" },
            { q: "File dengan ekstensi '.docx' merupakan format dokumen yang biasanya dibuat menggunakan aplikasi...", opts: ["Ms. Excel", "Ms. PowerPoint", "Ms. Word", "Ms. Access"], key: "Ms. Word" },
            { q: "Teknologi nirkabel jarak pendek yang umum digunakan untuk mentransfer file antar perangkat seluler adalah...", opts: ["Infrared", "Bluetooth", "Fiber Optic", "Broadband"], key: "Bluetooth" },
            { q: "Materi dasar yang pertama kali dipelajari mengenai teknologi informasi adalah...", opts: ["Pengenalan Informatika", "Sistem Database", "Kriptografi", "Robotika"], key: "Pengenalan Informatika" },
            { q: "Mengapa kita perlu belajar Informatika di sekolah?", opts: ["Agar bisa main game saja", "Mempersiapkan skill digital masa depan", "Hanya untuk syarat kelulusan", "Agar bisa merakit PC sendiri"], key: "Mempersiapkan skill digital masa depan" },
            { q: "Tiga komponen utama dalam Teknologi Informasi dan Komunikasi (TIK) adalah...", opts: ["Hardware, Software, Brainware", "Monitor, Mouse, Keyboard", "Google, Yahoo, Bing", "Excel, Word, PowerPoint"], key: "Hardware, Software, Brainware" },
            { q: "Internet sebagai jaringan global yang kita kenal sekarang, awal cikal bakalnya ditemukan pada tahun...", opts: ["1945", "1969 (ARPANET)", "1998", "2010"], key: "1969 (ARPANET)" },
            { q: "Apa perbedaan utama antara jaringan lokal (LAN) dengan internet?", opts: ["LAN menggunakan kabel, internet tidak", "Internet cakupannya global, LAN terbatas area kecil", "LAN lebih lambat dari internet", "Internet hanya untuk media sosial"], key: "Internet cakupannya global, LAN terbatas area kecil" },
            { q: "Apakah kepanjangan dari istilah jaringan LAN?", opts: ["Local Area Network", "Link Area Node", "Light Access Net", "Large Area Network"], key: "Local Area Network" },
            { q: "Manakah yang merupakan kumpulan topologi jaringan komputer?", opts: ["Bus, Star, Ring, Mesh", "Keyboard, Mouse, Monitor", "Windows, Linux, Android", "Word, Excel, Access"], key: "Bus, Star, Ring, Mesh" },
            { q: "Di bawah ini yang merupakan jenis platform media sosial populer adalah...", opts: ["WhatsApp, Facebook, Instagram", "Chrome, Firefox, Safari", "Windows, MacOS, Linux", "Photoshop, Corel, Canva"], key: "WhatsApp, Facebook, Instagram" },
            { q: "Apa salah satu manfaat positif dari penggunaan media sosial?", opts: ["Mempercepat komunikasi dan berbagi informasi", "Menghabiskan waktu luang", "Memperbanyak kuota internet", "Melihat foto orang lain saja"], key: "Mempercepat komunikasi dan berbagi informasi" },
            { q: "Salah satu dampak negatif dari media sosial jika tidak digunakan dengan bijak adalah...", opts: ["Penyebaran berita bohong (Hoax)", "Memudahkan mencari materi belajar", "Mendapatkan banyak teman", "Media promosi gratis"], key: "Penyebaran berita bohong (Hoax)" },
            { q: "Proses mengubah data menjadi kode rahasia agar tidak mudah dibaca oleh pihak yang tidak berwenang disebut...", opts: ["Enkripsi", "Deskripsi", "Kompresi", "Instalasi"], key: "Enkripsi" },
            { q: "Manakah yang merupakan media penyimpanan data permanen dengan kecepatan akses paling cepat saat ini?", opts: ["Hardisk Drive (HDD)", "Solid State Drive (SSD)", "Flashdisk", "Floppy Disk"], key: "Solid State Drive (SSD)" },
            { q: "Dalam pemrograman, tempat untuk menyimpan nilai data yang dapat berubah-ubah selama program dijalankan disebut...", opts: ["Konstanta", "Variabel", "Looping", "Function"], key: "Variabel" },
            { q: "Etika dan tanggung jawab dalam menggunakan teknologi informasi secara bijak dikenal dengan istilah...", opts: ["Digital Citizenship", "Cyber Crime", "Social Media Admin", "IT Support"], key: "Digital Citizenship" },
            { q: "Teknologi yang memungkinkan pengolahan data dalam skala yang sangat besar dan kompleks disebut...", opts: ["Small Data", "Big Data", "Manual Data", "Paper Data"], key: "Big Data" }
        ];

        const questionsB = [
            "Jelaskan secara singkat apa yang dimaksud dengan Cloud Computing!",
            "Sebutkan 2 contoh perangkat input (masukan) pada komputer!",
            "Apa yang dimaksud dengan algoritma dalam konteks pemrograman?",
            "Mengapa kita perlu menggunakan kata sandi (password) yang kuat untuk akun media sosial?",
            "Tuliskan langkah-langkah sederhana mengirim file menggunakan layanan Google Drive!"
        ];

        // --- APP STATE ---
        let currentView = 'exam';
        let currentUser = null;
        let tabSwitchCount = 0;
        let studentName = "";
        let submissions = [];
        let selectedSubmissionId = null; // Disimpan sebagai ID saja
        let isAuthReady = false;
        let lastSavedData = null;
        let autoSaveTimer = null;
        let isAdminLoading = false;
        let unsubscribeSubmissions = null;

        // --- AUTH INIT ---
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    isAuthReady = true;
                    if (user) await loadExistingDraft();
                    render();
                });
            } catch (error) {
                console.error(error);
                window.showWarning("Gagal terhubung. Pastikan 'Anonymous Auth' aktif di Firebase.");
            }
        };
        initAuth();

        // --- POP-UP LOGIC ---
        window.showWarning = (msg, title = "Informasi") => {
            document.getElementById('warning-title').textContent = title;
            document.getElementById('warning-message').textContent = msg;
            document.getElementById('modal-warning').classList.remove('hidden');
        };
        window.closeWarning = () => { document.getElementById('modal-warning').classList.add('hidden'); };

        // --- DATA LOGIC ---
        const loadExistingDraft = async () => {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    tabSwitchCount = data.tabSwitches || 0;
                    if (data.finalSubmitted) { 
                        currentView = 'finished'; 
                        studentName = data.name; 
                    } else { 
                        studentName = data.name || ""; 
                        lastSavedData = data; 
                    }
                }
            } catch (e) { }
        };

        window.triggerAutoSave = () => {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => { await saveDraft(); }, 1000);
        };

        const saveDraft = async (isFinal = false) => {
            if (!currentUser || !db || currentView !== 'exam') return;
            const answersA = [];
            questionsA.forEach((_, i) => {
                const sel = document.querySelector(`input[name="qa_${i}"]:checked`);
                answersA.push(sel ? sel.value : "");
            });
            const answersB = [];
            questionsB.forEach((_, i) => {
                const val = document.getElementById(`qb_${i}`);
                answersB.push(val ? val.value.trim() : "");
            });
            const data = {
                name: document.getElementById('input-name')?.value.trim() || studentName,
                class: document.getElementById('input-class')?.value || "XII A",
                tabSwitches: tabSwitchCount,
                answersA,
                answersB,
                uid: currentUser.uid,
                timestamp: new Date().toISOString(),
                finalSubmitted: isFinal,
                graded: isFinal ? false : (lastSavedData?.graded || false),
                essayScore: lastSavedData?.essayScore || 0
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', currentUser.uid), data);
                lastSavedData = data;
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.classList.remove('hidden');
                    indicator.classList.add('flex', 'animate-save');
                    setTimeout(() => indicator.classList.remove('animate-save'), 1000);
                }
            } catch (e) { }
        };

        // --- SECURITY LOGIC ---
        const handleSecurityAlert = () => {
            if (currentView === 'exam' && isAuthReady) {
                tabSwitchCount++;
                saveDraft();
                window.showWarning(`Halaman ditinggalkan. Pelanggaran: ${tabSwitchCount}x.`, "Sistem Keamanan");
            }
        };
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'hidden') handleSecurityAlert(); });
        window.onblur = () => { handleSecurityAlert(); };

        const calculateScore = (answersA = [], essayScore = 0) => {
            let correctCount = 0;
            if (answersA.length > 0) {
                answersA.forEach((ans, i) => { if (ans === questionsA[i]?.key) correctCount++; });
            }
            const rawScore = (correctCount * 2) + parseFloat(essayScore); 
            const finalScore = Math.round((rawScore / 100) * 88 + 10);
            let grade = finalScore >= 90 ? 'A' : finalScore >= 80 ? 'B' : finalScore >= 70 ? 'C' : 'D';
            return { score: finalScore, grade, correct: correctCount };
        };

        const initSubmissionsListener = () => {
            if (!db || !currentUser) return;
            if (unsubscribeSubmissions) unsubscribeSubmissions();
            isAdminLoading = true;
            render();
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
            unsubscribeSubmissions = onSnapshot(q, (snapshot) => {
                submissions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                isAdminLoading = false;
                render();
            }, (err) => {
                isAdminLoading = false;
                render();
                window.showWarning("Akses ditolak. Cek Firestore Rules.");
            });
        };

        // --- RENDERER ---
        const render = () => {
            const root = document.getElementById('app');
            if (!isAuthReady) return;
            if (currentView === 'exam') {
                root.innerHTML = renderExam();
                if (lastSavedData) {
                    document.getElementById('input-name').value = lastSavedData.name || "";
                    document.getElementById('input-class').value = lastSavedData.class || "XII A";
                    lastSavedData.answersA.forEach((ans, i) => {
                        if (ans) {
                            const radio = document.querySelector(`input[name="qa_${i}"][value="${ans}"]`);
                            if (radio) radio.checked = true;
                        }
                    });
                    lastSavedData.answersB.forEach((ans, i) => {
                        if (ans) document.getElementById(`qb_${i}`).value = ans;
                    });
                }
            } else if (currentView === 'finished') { root.innerHTML = renderFinished(); }
            else if (currentView === 'admin_login') { root.innerHTML = renderAdminLogin(); }
            else if (currentView === 'admin_dashboard') { root.innerHTML = renderAdminDashboard(); }
        };

        const renderExam = () => `
            <header class="bg-white border-b border-slate-100 py-6 px-4 mb-4 relative flex justify-between items-center max-w-4xl mx-auto">
                <div class="flex items-center space-x-2">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaC7zNuBILaC544879xnoWvGCnxA9Fc83PCg&s" class="h-6 grayscale opacity-50">
                    <h1 class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-800">SMAS TQ WI Anabanua</h1>
                </div>
               <button onclick="window.setView('admin_login')" class="text-[8px] font-bold text-white hover:text-white">
  Admin
</button>
            </header>

            <main class="max-w-2xl mx-auto px-4 pb-32 text-slate-700">
                <div class="mb-10 text-center">
                    <h2 class="text-base font-bold text-slate-900 uppercase tracking-tight">SMAS Tahfidz Al-Quran Wahdah Islamiyah Anabanua</h2>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">UJIAN SEKOLAH - INFORMATIKA</p>
                </div>

                <div class="bg-slate-50 border border-slate-100 rounded-lg p-5 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="input-name" oninput="window.triggerAutoSave()" placeholder="Nama Lengkap *" class="p-3 bg-white border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-[13px]">
                        <select id="input-class" onchange="window.triggerAutoSave()" class="p-3 bg-white border border-slate-200 rounded-lg outline-none text-[13px]">
                            <option>XII A</option>
                            <option>XII B</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    ${questionsA.map((q, i) => `
                        <div class="bg-white border border-slate-100 rounded-lg p-5">
                            <p class="text-[13px] font-medium text-slate-700 mb-4">${i+1}. ${q.q}</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                                ${q.opts.map(opt => `
                                    <label class="flex items-center p-2.5 border border-slate-100 rounded-lg cursor-pointer transition-all hover:bg-slate-50">
                                        <input type="radio" name="qa_${i}" value="${opt}" onchange="window.triggerAutoSave()" class="w-3.5 h-3.5 text-blue-600">
                                        <span class="ml-2.5 text-[11px] font-medium text-slate-500">${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="mt-8 space-y-4 mb-16">
                    ${questionsB.map((q, i) => `
                        <div class="bg-white border border-slate-100 rounded-lg p-5">
                            <p class="text-[13px] font-medium text-slate-700 mb-3">${i+1}. ${q}</p>
                            <textarea id="qb_${i}" oninput="window.triggerAutoSave()" class="w-full p-4 border border-slate-100 rounded-lg outline-none focus:border-blue-400 text-[13px]" rows="3" placeholder="Jawaban..."></textarea>
                        </div>
                    `).join('')}
                </div>

                <button onclick="window.handleFinish()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-lg hover:bg-black transition-all active:scale-[0.99] text-[11px] uppercase tracking-widest">Kirim Jawaban</button>
            </main>

            <div id="save-indicator" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white px-4 py-2 rounded-full border border-slate-100 hidden items-center space-x-2 z-50">
                <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Sinkron...</span>
            </div>
        `;

        const renderFinished = () => `
            <div class="min-h-screen flex items-center justify-center p-6 text-center">
                <div class="max-w-sm w-full">
                    <div class="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center mx-auto mb-6">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-lg font-bold text-slate-900 mb-2 uppercase">Selesai</h2>
                    <p class="text-xs text-slate-400 mb-8 font-medium">Terima kasih, <b>${studentName}</b>. Jawaban terkirim.</p>
                    <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-[10px] uppercase tracking-widest">Keluar</button>
                </div>
            </div>
        `;

        const renderAdminLogin = () => `
            <div class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                <div class="bg-white border border-slate-200 p-8 rounded-lg w-full max-w-xs text-center">
                    <h2 class="text-[10px] font-bold text-slate-400 mb-8 uppercase tracking-[0.3em]">Login Monitor</h2>
                    <input type="password" id="admin-pass" class="w-full p-3 border border-slate-200 rounded-lg mb-4 text-center font-bold outline-none focus:border-blue-400" placeholder="KATA SANDI">
                    <button onclick="window.doAdminLogin()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-[10px] tracking-widest uppercase hover:bg-black transition-all">Masuk</button>
                    <button onclick="window.setView('exam')" class="mt-8 text-[9px] text-slate-300 hover:text-slate-500 font-bold uppercase transition-colors tracking-widest">Batal</button>
                </div>
            </div>
        `;

        const renderAdminDashboard = () => {
            const sortedSubmissions = [...submissions].sort((a,b) => b.timestamp.localeCompare(a.timestamp));
            const selectedSubmission = selectedSubmissionId ? submissions.find(s => s.id === selectedSubmissionId) : null;
            
            return `
            <div class="p-6 md:p-12 max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-10 pb-6 border-b border-slate-100">
                    <div>
                        <h1 class="text-xs font-bold text-slate-400 uppercase tracking-[0.3em]">Monitor Ujian</h1>
                        <p class="text-base font-bold text-slate-800 mt-1">XII Informatika</p>
                    </div>
                    <button onclick="window.setView('exam')" class="bg-white border border-slate-200 px-5 py-2 rounded-lg text-[9px] font-bold hover:bg-slate-50 text-slate-400 tracking-widest uppercase transition-all">Keluar</button>
                </div>

                <div class="bg-white border border-slate-100 rounded-lg overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-[9px] uppercase tracking-widest font-bold">
                                <tr>
                                    <th class="px-6 py-4 tracking-[0.1em]">Siswa</th>
                                    <th class="px-6 py-4 tracking-[0.1em]">Status</th>
                                    <th class="px-6 py-4 tracking-[0.1em]">Masalah</th>
                                    <th class="px-6 py-4 text-right tracking-[0.1em]">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50 text-[12px] font-medium">
                                ${isAdminLoading ? '<tr><td colspan="4" class="px-8 py-20 text-center text-blue-500 font-bold italic animate-pulse tracking-widest uppercase text-[10px]">Memperbarui data...</td></tr>' : ''}
                                ${!isAdminLoading && sortedSubmissions.length === 0 ? '<tr><td colspan="4" class="px-8 py-20 text-center text-slate-300 italic uppercase text-[10px] tracking-widest">Belum ada data masuk.</td></tr>' : ''}
                                ${sortedSubmissions.map(s => {
                                    const res = calculateScore(s.answersA, s.essayScore || 0);
                                    return `
                                    <tr class="hover:bg-slate-50/50">
                                        <td class="px-6 py-5">
                                            <p class="font-bold text-slate-800 text-[13px]">${s.name || '<span class="text-slate-200">Anonim</span>'}</p>
                                            <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">${s.class}</p>
                                        </td>
                                        <td class="px-6 py-5">
                                            <span class="text-[8px] font-bold px-2 py-0.5 rounded border ${s.finalSubmitted ? 'bg-green-50 text-green-600 border-green-200' : 'bg-blue-50 text-blue-600 border-blue-200'} uppercase tracking-widest">
                                                ${s.finalSubmitted ? 'Done' : 'Live'}
                                            </span>
                                            <span class="text-[10px] font-bold text-slate-400 ml-2">S: ${res.score}</span>
                                        </td>
                                        <td class="px-6 py-5">
                                            <span class="font-bold text-[10px] ${s.tabSwitches > 0 ? 'text-red-400' : 'text-slate-200'} uppercase tracking-widest">${s.tabSwitches}x Tab</span>
                                        </td>
                                        <td class="px-6 py-5 text-right">
                                            <button onclick="window.inspectSubmission('${s.id}')" class="text-slate-400 hover:text-slate-900 px-3 py-1 rounded text-[9px] font-bold tracking-widest uppercase border border-slate-100 hover:border-slate-300 transition-all">PERIKSA</button>
                                        </td>
                                    </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                ${selectedSubmission ? renderInspector(selectedSubmission) : ''}
            </div>
            `;
        };

        const renderInspector = (submission) => {
            const res = calculateScore(submission.answersA, submission.essayScore || 0);
            return `
            <div class="fixed inset-0 bg-white z-[60] overflow-y-auto p-4 md:p-12 custom-scrollbar">
                <div class="max-w-5xl mx-auto">
                    <div class="flex justify-between items-start mb-12 pb-8 border-b border-slate-100">
                        <div>
                            <div class="flex items-center space-x-2 text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-2">
                                <span>Laporan Hasil</span>
                                <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                                <span>${submission.class}</span>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-800 uppercase tracking-tight leading-none">${submission.name || 'Peserta'}</h2>
                            <div class="flex gap-4 mt-4">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">PG: ${res.correct}/40 Benar</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pindah Tab: ${submission.tabSwitches}x</span>
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Nilai: ${res.score} (${res.grade})</span>
                            </div>
                        </div>
                        <button onclick="window.closeInspector()" class="bg-slate-50 text-slate-400 hover:text-slate-900 p-3 rounded-lg border border-slate-100 transition-all active:scale-90">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>

                    <div class="space-y-16">
                        <div>
                            <h3 class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em] mb-8 border-l-2 border-slate-100 pl-4">I. Pilihan Ganda</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${submission.answersA.map((ans, i) => {
                                    const isCorrect = ans === questionsA[i]?.key;
                                    return `
                                        <div class="p-4 border border-slate-50 rounded-lg bg-slate-50/20">
                                            <p class="text-[11px] font-bold text-slate-700 leading-relaxed mb-3">${i+1}. ${questionsA[i]?.q || '?'}</p>
                                            <div class="text-[9px] font-bold uppercase tracking-widest space-y-1">
                                                <p class="${isCorrect ? 'text-green-500' : 'text-red-400'}">Siswa: ${ans || '-'}</p>
                                                ${!isCorrect ? `<p class="text-slate-300 font-medium lowercase italic">Kunci: ${questionsA[i]?.key}</p>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div>
                            <h3 class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em] mb-8 border-l-2 border-slate-100 pl-4">II. Essay</h3>
                            <div class="space-y-6">
                                ${questionsB.map((q, i) => `
                                    <div class="p-6 border border-slate-100 rounded-lg">
                                        <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-2">Soal ${i+1}</p>
                                        <p class="text-[13px] font-semibold text-slate-800 mb-5 leading-relaxed">${q}</p>
                                        <div class="text-[13px] leading-relaxed text-slate-600 bg-slate-50 p-6 rounded-lg border border-slate-200 italic font-medium">
                                            ${submission.answersB[i] || 'Peserta tidak menjawab.'}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-white border-2 border-blue-50 p-10 rounded-2xl text-center mb-40 max-w-xs mx-auto">
                            <label class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.4em] block mb-6">Skor Essay (0-20)</label>
                            <input type="number" id="essay-score-input" value="${submission.essayScore || 0}" min="0" max="20" class="w-full text-center text-5xl font-bold mb-10 outline-none focus:text-blue-600 border-b border-slate-100 transition-all">
                            <button onclick="window.saveGrading('${submission.id}')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition-all text-[10px] tracking-[0.3em] uppercase">Simpan Nilai</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        };

        // --- ACTIONS ---
        window.setView = (view) => {
            if (!isAuthReady) { window.showWarning("Menghubungkan..."); return; }
            currentView = view;
            if (view === 'admin_dashboard') initSubmissionsListener();
            else { if (unsubscribeSubmissions) unsubscribeSubmissions(); render(); }
        };

        window.doAdminLogin = () => {
            if (document.getElementById('admin-pass').value === 'admin123') window.setView('admin_dashboard');
            else window.showWarning("Sandi salah.");
        };

        window.handleFinish = async () => {
            if (!isAuthReady) return;
            studentName = document.getElementById('input-name').value.trim();
            if (!studentName) return window.showWarning("Isi Nama Lengkap.");
            for (let i = 0; i < questionsA.length; i++) {
                if (!document.querySelector(`input[name="qa_${i}"]:checked`)) return window.showWarning(`PG No. ${i+1} kosong.`);
            }
            for (let i = 0; i < questionsB.length; i++) {
                if (!document.getElementById(`qb_${i}`).value.trim()) return window.showWarning(`Essay No. ${i+1} kosong.`);
            }
            try { await saveDraft(true); currentView = 'finished'; render(); }
            catch (err) { window.showWarning("Gagal kirim."); }
        };

        window.inspectSubmission = (id) => { selectedSubmissionId = id; render(); };
        window.closeInspector = () => { selectedSubmissionId = null; render(); };
        window.saveGrading = async (id) => {
            const score = document.getElementById('essay-score-input').value;
            if (score < 0 || score > 20) return window.showWarning("Skor 0-20.");
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', id), {
                    essayScore: parseFloat(score), graded: true
                });
                window.showWarning("Nilai disimpan.", "Sukses");
            } catch (err) { window.showWarning("Gagal simpan."); }
        };

        render();
    </script>
</body>
</html>
